// ─── Tax P&L Calculator ───────────────────────────────────────────────────────
function TaxPL({ data }) {
  const { assets, totalTax, postTaxGains, totalGains } = data;
  const LTCG_EXEMPTION = 100000;
  const taxableAssets = assets.filter(a => a.taxAmt !== null && a.taxAmt !== undefined && a.gain !== 0);
  const totalLTCG = taxableAssets.filter(a => a.isLTCG && a.gain > 0).reduce((s, a) => s + a.gain, 0);
  const totalSTCG = taxableAssets.filter(a => a.isLTCG === false && a.gain > 0).reduce((s, a) => s + a.gain, 0);
  const netTax = Math.round(totalTax || 0);
  const postTax = Math.round(totalGains - netTax);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div style={{ fontSize: 13, color: 'var(--muted)' }}>
        Tax is estimated based on Indian rules: <b style={{ color: 'var(--text)' }}>LTCG 10%</b> (equity held &gt;1yr, above ₹1L exemption) and <b style={{ color: 'var(--text)' }}>STCG 15%</b> (equity held &lt;1yr). FD income taxed at <b style={{ color: 'var(--text)' }}>30%</b>. NPS is exempt.
      </div>

      {/* Summary cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12 }}>
        {[
          { label: 'Total Gains (Pre-tax)',  value: fmt(totalGains),  sub: null,                     color: 'var(--gain)' },
          { label: 'Estimated Tax',          value: fmt(netTax),      sub: 'across all holdings',    color: 'var(--loss)' },
          { label: 'Post-Tax Gains',         value: fmt(postTax),     sub: 'what you keep',          color: 'var(--gain)' },
          { label: 'Effective Tax Rate',     value: totalGains > 0 ? (netTax/totalGains*100).toFixed(1)+'%' : '0%', sub: 'on total gains', color: 'var(--warn)' },
        ].map(s => (
          <div key={s.label} style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:10, padding:'14px 16px' }}>
            <div style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.04em', marginBottom:4 }}>{s.label}</div>
            <div style={{ fontSize:20, fontWeight:800, color:s.color, fontFamily:'var(--font-mono)' }}>{s.value}</div>
            {s.sub && <div style={{ fontSize:11, color:'var(--muted)', marginTop:2 }}>{s.sub}</div>}
          </div>
        ))}
      </div>

      {/* LTCG vs STCG summary */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, padding: '14px 16px' }}>
          <div style={{ fontSize: 11, color: 'var(--gain)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 8 }}>LTCG (held &gt;1 year)</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: 'var(--gain)', fontFamily: 'var(--font-mono)' }}>{fmt(totalLTCG)}</div>
          <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 4 }}>
            Exempt: {fmt(LTCG_EXEMPTION)} · Taxable: {fmt(Math.max(0, totalLTCG - LTCG_EXEMPTION))} · Tax @ 10%: {fmt(Math.max(0, totalLTCG - LTCG_EXEMPTION) * 0.1)}
          </div>
        </div>
        <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, padding: '14px 16px' }}>
          <div style={{ fontSize: 11, color: 'var(--warn)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 8 }}>STCG (held &lt;1 year)</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: 'var(--warn)', fontFamily: 'var(--font-mono)' }}>{fmt(totalSTCG)}</div>
          <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 4 }}>Taxed at flat 15% · Tax: {fmt(totalSTCG * 0.15)}</div>
        </div>
      </div>

      {/* Per-holding table */}
      <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden' }}>
        <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', fontSize: 12, fontWeight: 600, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em' }}>Per-Holding Tax Breakdown</div>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead style={{ background: 'var(--surface2)' }}>
            <tr>
              {['Asset', 'Holding Period', 'Tax Type', 'Gain', 'Tax Rate', 'Tax Amount', 'Post-Tax Gain'].map(h => (
                <th key={h} style={{ fontSize: 10, color: 'var(--muted)', padding: '8px 12px', textAlign: h === 'Asset' ? 'left' : 'right', textTransform: 'uppercase', letterSpacing: '.04em', fontWeight: 600, borderBottom: '1px solid var(--border)' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {taxableAssets.map((a, i) => {
              const holdingStr = a.holdingDays ? (a.holdingDays >= 365 ? (a.holdingDays/365).toFixed(1)+'yr' : a.holdingDays+'d') : '—';
              const taxTypeLabel = a.isLTCG ? 'LTCG' : a.isLTCG === false ? 'STCG' : a.category === 'FD' ? 'Income' : a.category === 'NPS' ? 'Exempt' : '—';
              const taxColor = a.isLTCG ? 'var(--gain)' : a.isLTCG === false ? 'var(--warn)' : 'var(--muted)';
              return (
                <tr key={a.id} onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <td style={{ padding: '9px 12px', borderBottom: '1px solid var(--border)' }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>{a.name}</div>
                    {a.ticker && <div style={{ fontSize: 10, color: 'var(--muted)', fontFamily: 'var(--font-mono)' }}>{a.exchange}:{a.ticker}</div>}
                  </td>
                  <td style={{ padding: '9px 12px', borderBottom: '1px solid var(--border)', textAlign: 'right', fontSize: 12, fontFamily: 'var(--font-mono)', color: 'var(--muted)' }}>{holdingStr}</td>
                  <td style={{ padding: '9px 12px', borderBottom: '1px solid var(--border)', textAlign: 'right' }}>
                    <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 99, background: a.isLTCG ? 'var(--gain-bg)' : a.isLTCG === false ? 'var(--warn-bg)' : 'var(--surface2)', color: taxColor }}>{taxTypeLabel}</span>
                  </td>
                  <td style={{ padding: '9px 12px', borderBottom: '1px solid var(--border)', textAlign: 'right', fontFamily: 'var(--font-mono)', fontSize: 12, color: a.gain >= 0 ? 'var(--gain)' : 'var(--loss)', fontWeight: 600 }}>{a.gain >= 0 ? '+' : ''}{fmt(a.gain)}</td>
                  <td style={{ padding: '9px 12px', borderBottom: '1px solid var(--border)', textAlign: 'right', fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--muted)' }}>{a.taxRate !== null ? (a.taxRate * 100).toFixed(0) + '%' : '—'}</td>
                  <td style={{ padding: '9px 12px', borderBottom: '1px solid var(--border)', textAlign: 'right', fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--loss)', fontWeight: 600 }}>{a.taxAmt > 0 ? '-' + fmt(a.taxAmt) : '—'}</td>
                  <td style={{ padding: '9px 12px', borderBottom: '1px solid var(--border)', textAlign: 'right', fontFamily: 'var(--font-mono)', fontSize: 12, color: a.postTaxGain >= 0 ? 'var(--gain)' : 'var(--loss)', fontWeight: 700 }}>{a.postTaxGain >= 0 ? '+' : ''}{fmt(a.postTaxGain)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Harvesting tip */}
      <div style={{ background: 'var(--surface2)', border: '1px solid var(--warn)', borderRadius: 10, padding: '12px 16px' }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--warn)', marginBottom: 4 }}>💡 Tax Harvesting Opportunity</div>
        <div style={{ fontSize: 12, color: 'var(--muted)', lineHeight: 1.6 }}>
          Websol Energy has an unrealised loss of <b style={{ color: 'var(--loss)' }}>-{fmt(298000 - 320000)}</b>. Booking this loss before year-end can offset STCG from other positions, saving ~{fmt(Math.abs(298000 - 320000) * 0.15)} in taxes. Re-enter after 31 days to avoid wash-sale concerns.
        </div>
      </div>
    </div>
  );
}

// ─── Goal Based Planning ──────────────────────────────────────────────────────
function GoalPlanning({ data }) {
  const { netWorth, xirr } = data;
  const [goals, setGoals] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('px-goals')) || data.goals || []; } catch(e) { return data.goals || []; }
  });
  const [editId, setEditId] = React.useState(null);
  const [showAdd, setShowAdd] = React.useState(false);
  const [newGoal, setNewGoal] = React.useState({ name:'', targetAmount:'', targetYear:'', monthlyAddition:'', icon:'🎯' });

  function saveGoals(g) { setGoals(g); localStorage.setItem('px-goals', JSON.stringify(g)); }
  function deleteGoal(id) { saveGoals(goals.filter(g => g.id !== id)); }
  function addGoal() {
    if (!newGoal.name || !newGoal.targetAmount) return;
    const g = { ...newGoal, id:'g'+Date.now(), targetAmount:+newGoal.targetAmount, targetYear:+newGoal.targetYear||2030, monthlyAddition:+newGoal.monthlyAddition||0, currentAmount:0 };
    saveGoals([...goals, g]);
    setNewGoal({ name:'', targetAmount:'', targetYear:'', monthlyAddition:'', icon:'🎯' });
    setShowAdd(false);
  }

  const TODAY_YEAR = 2026;
  const assumedXIRR = (xirr || 18) / 100;
  const inp = (s={}) => ({ background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:6, padding:'5px 9px', fontSize:12, color:'var(--text)', outline:'none', fontFamily:'var(--font-sans)', ...s });

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ fontSize: 13, color: 'var(--muted)' }}>
          Projections use your portfolio XIRR of <b style={{ color: 'var(--gain)' }}>{xirr?.toFixed(1)}%</b> + monthly SIP additions.
        </div>
        <button onClick={() => setShowAdd(v=>!v)}
          style={{ display:'flex', alignItems:'center', gap:6, padding:'7px 14px', borderRadius:8, background:'var(--accent)', border:'none', color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer' }}>
          <Icon name="plus" size={14} color="#fff" /> Add Goal
        </button>
      </div>

      {showAdd && (
        <div style={{ background:'var(--card)', border:'1px solid var(--accent)', borderRadius:12, padding:'16px 20px' }}>
          <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr', gap:10, marginBottom:10 }}>
            <input value={newGoal.name} onChange={e=>setNewGoal(p=>({...p,name:e.target.value}))} placeholder="Goal name *" style={inp({})} />
            <input type="number" value={newGoal.targetAmount} onChange={e=>setNewGoal(p=>({...p,targetAmount:e.target.value}))} placeholder="Target ₹ *" style={inp({fontFamily:'var(--font-mono)'})} />
            <input type="number" value={newGoal.targetYear} onChange={e=>setNewGoal(p=>({...p,targetYear:e.target.value}))} placeholder="Year" style={inp({fontFamily:'var(--font-mono)'})} min="2026" max="2050" />
            <input type="number" value={newGoal.monthlyAddition} onChange={e=>setNewGoal(p=>({...p,monthlyAddition:e.target.value}))} placeholder="Monthly SIP ₹" style={inp({fontFamily:'var(--font-mono)'})} />
            <input value={newGoal.icon} onChange={e=>setNewGoal(p=>({...p,icon:e.target.value}))} placeholder="Icon" style={inp({width:60})} />
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={addGoal} style={{ padding:'7px 16px', background:'var(--accent)', border:'none', borderRadius:7, color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer' }}>Save</button>
            <button onClick={()=>setShowAdd(false)} style={{ padding:'7px 14px', background:'transparent', border:'1px solid var(--border)', borderRadius:7, color:'var(--muted)', fontSize:13, cursor:'pointer' }}>Cancel</button>
          </div>
        </div>
      )}

      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {goals.map(g => {
          const yearsLeft = g.targetYear - TODAY_YEAR;
          const current = g.currentAmount || (g.id === 'g1' ? netWorth : g.currentAmount || 0);

          // FV of current corpus + monthly SIPs at XIRR
          const r = assumedXIRR / 12;
          const n = yearsLeft * 12;
          const fvCorpus = current * Math.pow(1 + assumedXIRR, yearsLeft);
          const fvSIP    = n > 0 && r > 0 ? g.monthlyAddition * ((Math.pow(1+r, n) - 1) / r) : 0;
          const projected = Math.round(fvCorpus + fvSIP);
          const shortfall = g.targetAmount - projected;
          const onTrack   = projected >= g.targetAmount;
          const progress  = Math.min(100, current / g.targetAmount * 100);

          // Required monthly SIP to bridge shortfall
          const reqSIP = shortfall > 0 && n > 0 && r > 0
            ? Math.round(shortfall * r / (Math.pow(1+r,n) - 1))
            : 0;

          return (
            <div key={g.id} style={{ background:'var(--card)', border:`1px solid ${onTrack?'var(--gain)':'var(--border)'}`, borderRadius:12, padding:'18px 20px' }}>
              <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12, marginBottom:14 }}>
                <div style={{ display:'flex', gap:12, alignItems:'center' }}>
                  <span style={{ fontSize:28 }}>{g.icon}</span>
                  <div>
                    <div style={{ fontSize:15, fontWeight:700, color:'var(--text)' }}>{g.name}</div>
                    <div style={{ fontSize:11, color:'var(--muted)', marginTop:2 }}>Target: {fmt(g.targetAmount)} by {g.targetYear} · {yearsLeft} years left</div>
                  </div>
                </div>
                <div style={{ display:'flex', gap:10, alignItems:'center' }}>
                  <span style={{ fontSize:11, padding:'4px 10px', borderRadius:99, fontWeight:700,
                    background:onTrack?'var(--gain-bg)':'var(--warn-bg)', color:onTrack?'var(--gain)':'var(--warn)' }}>
                    {onTrack ? '✓ On Track' : '⚠ Needs attention'}
                  </span>
                  <button onClick={()=>deleteGoal(g.id)} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--muted)', padding:3 }}
                    onMouseEnter={e=>e.currentTarget.style.color='var(--loss)'} onMouseLeave={e=>e.currentTarget.style.color='var(--muted)'}>
                    <Icon name="trash" size={14} />
                  </button>
                </div>
              </div>

              {/* Metrics row */}
              <div style={{ display:'flex', gap:20, flexWrap:'wrap', marginBottom:14 }}>
                {[
                  { label:'Current Corpus',   value:fmt(current),    color:'var(--text)' },
                  { label:'Projected by '+g.targetYear, value:fmt(projected), color:onTrack?'var(--gain)':'var(--warn)' },
                  { label:'Target',            value:fmt(g.targetAmount), color:'var(--text)' },
                  { label:onTrack?'Surplus':'Shortfall', value:fmt(Math.abs(shortfall)), color:onTrack?'var(--gain)':'var(--loss)' },
                  { label:'Monthly SIP',       value:fmt(g.monthlyAddition), color:'var(--muted)' },
                  reqSIP > 0 && { label:'SIP needed to bridge', value:fmt(reqSIP), color:'var(--warn)' },
                ].filter(Boolean).map(m => (
                  <div key={m.label}>
                    <div style={{ fontSize:9, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:2 }}>{m.label}</div>
                    <div style={{ fontSize:15, fontWeight:700, color:m.color, fontFamily:'var(--font-mono)' }}>{m.value}</div>
                  </div>
                ))}
              </div>

              {/* Progress bar */}
              <div>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                  <span style={{ fontSize:10, color:'var(--muted)' }}>Today: {fmt(current)} ({progress.toFixed(1)}%)</span>
                  <span style={{ fontSize:10, color:'var(--muted)' }}>Target: {fmt(g.targetAmount)}</span>
                </div>
                <div style={{ height:10, background:'var(--border)', borderRadius:99, overflow:'hidden' }}>
                  <div style={{ width:`${progress}%`, height:'100%', background:onTrack?'var(--gain)':'var(--accent)', borderRadius:99, transition:'width .5s' }} />
                </div>
                {/* Projected marker */}
                <div style={{ position:'relative', height:6, marginTop:3 }}>
                  <div style={{ position:'absolute', left:`${Math.min(100, projected/g.targetAmount*100)}%`, top:0, transform:'translateX(-50%)',
                    width:2, height:6, background:'var(--text)', borderRadius:1 }} title={`Projected: ${fmt(projected)}`} />
                </div>
                <div style={{ fontSize:10, color:'var(--muted)', marginTop:1 }}>
                  <span style={{ marginLeft:`${Math.min(96, projected/g.targetAmount*100)}%` }}>↑ proj.</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

      {tab === 'targets' && <TargetPriceCalc data={data} />}
      {tab === 'tax'     && <TaxPL           data={data} />}
      {tab === 'goals'   && <GoalPlanning    data={data} />}
      {tab === 'whatif'  && <WhatIfSimulator data={data} />}
      {tab === 'csv'     && <CSVImport       data={data} />}
      {tab === 'export'  && <ExportPDF       data={data} />}
    </div>
  );
}

Object.assign(window, { Tools });

  </script>

  <!-- ─── review.jsx ─────────────────────────────────── -->
  <script type="text/babel">
// Quarterly Review Screen — per-holding checklist with localStorage persistence
const { useState, useMemo } = React;

const RESULT_OPTIONS = [
  { value:'beat',    label:'Beat',    color:'var(--gain)',  bg:'var(--gain-bg)'  },
  { value:'inline',  label:'In-line', color:'var(--info)',  bg:'var(--info-bg)'  },
  { value:'miss',    label:'Miss',    color:'var(--loss)',  bg:'var(--loss-bg)'  },
  { value:'pending', label:'Pending', color:'var(--muted)', bg:'var(--surface2)' },
];
const CONVICTION_DELTA = [
  { value:'up',   label:'▲ Up',   color:'var(--gain)' },
  { value:'same', label:'= Same', color:'var(--muted)' },
  { value:'down', label:'▼ Down', color:'var(--loss)'  },
];
const ACTIONS = [
  { value:'hold',   label:'Hold',   color:'var(--info)'  },
  { value:'add',    label:'Add',    color:'var(--gain)'  },
  { value:'reduce', label:'Reduce', color:'var(--warn)'  },
  { value:'exit',   label:'Exit',   color:'var(--loss)'  },
  { value:'watch',  label:'Watch',  color:'var(--muted)' },
];

const QUARTERS = ['Q1 FY26 (Apr–Jun 25)', 'Q2 FY26 (Jul–Sep 25)', 'Q3 FY26 (Oct–Dec 25)', 'Q4 FY26 (Jan–Mar 26)'];

function ReviewCard({ asset, review, onChange }) {
  const gain    = asset.current - asset.invested;
  const gainPct = gain / asset.invested * 100;
  const [open, setOpen] = useState(false);

  const completionCount = [review.thesisIntact!==undefined, review.result, review.convictionDelta, review.action].filter(Boolean).length;
  const completionPct   = completionCount / 4 * 100;
  const isComplete      = completionCount === 4;

  function update(key, val) { onChange({ ...review, [key]: val, lastUpdated: new Date().toISOString().split('T')[0] }); }

  const borderColor = isComplete ? 'var(--gain)' : completionCount > 0 ? 'var(--warn)' : 'var(--border)';

  return (
    <div style={{ background:'var(--card)', border:`1px solid ${borderColor}`, borderRadius:12, overflow:'hidden', transition:'border-color .2s' }}>
      {/* Header row — always visible */}
      <div style={{ padding:'12px 16px', cursor:'pointer', display:'flex', alignItems:'center', gap:12 }}
        onClick={() => setOpen(o => !o)}>
        {/* Completion ring */}
        <svg width={32} height={32} viewBox="0 0 32 32" style={{ flexShrink:0 }}>
          <circle cx="16" cy="16" r="13" fill="none" stroke="var(--border)" strokeWidth="3"/>
          <circle cx="16" cy="16" r="13" fill="none" stroke={isComplete ? 'var(--gain)' : 'var(--accent)'}
            strokeWidth="3" strokeDasharray={`${completionPct * 0.817} 100`}
            strokeLinecap="round" transform="rotate(-90 16 16)"
            style={{ transition:'stroke-dasharray .3s' }} />
          <text x="16" y="20" textAnchor="middle" fontSize="9" fontWeight="700" fill="var(--text)" fontFamily="var(--font-mono)">{completionCount}/4</text>
        </svg>

        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:7, flexWrap:'wrap' }}>
            <span style={{ fontSize:13, fontWeight:700, color:'var(--text)' }}>{asset.name}</span>
            {asset.rec && <Badge rec={asset.rec} size="xs" />}
            {asset.conviction && <ConvictionDot score={asset.conviction} />}
            {isComplete && <span style={{ fontSize:10, color:'var(--gain)', fontWeight:700, background:'var(--gain-bg)', padding:'1px 7px', borderRadius:99 }}>✓ REVIEWED</span>}
          </div>
          <div style={{ fontSize:10, color:'var(--muted)', marginTop:2, fontFamily:'var(--font-mono)' }}>
            {asset.ticker && `${asset.exchange}:${asset.ticker} · `}
            Invested {fmt(asset.invested)} · Current {fmt(asset.current)} ·
            <span style={{ color: gain >= 0 ? 'var(--gain)' : 'var(--loss)', fontWeight:600 }}> {gain>=0?'+':''}{fmt(gain)} ({fmtPct(gainPct)})</span>
          </div>
        </div>

        {/* Quick chips — completed fields */}
        <div style={{ display:'flex', gap:5, flexWrap:'wrap', justifyContent:'flex-end', maxWidth:220 }}>
          {review.result && (() => { const c = RESULT_OPTIONS.find(r=>r.value===review.result); return c ? <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:99, background:c.bg, color:c.color }}>{c.label}</span> : null; })()}
          {review.action && (() => { const c = ACTIONS.find(a=>a.value===review.action); return c ? <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:99, background:'var(--surface2)', color:c.color, border:`1px solid ${c.color}` }}>{c.label}</span> : null; })()}
          {review.lastUpdated && <span style={{ fontSize:10, color:'var(--muted)' }}>{review.lastUpdated}</span>}
        </div>

        <span style={{ color:'var(--muted)', fontSize:12, flexShrink:0, transform: open ? 'rotate(90deg)' : 'none', transition:'transform .15s' }}>▶</span>
      </div>

      {/* Expanded review form */}
      {open && (
        <div style={{ borderTop:'1px solid var(--border)', padding:'16px 20px', display:'flex', flexDirection:'column', gap:16, background:'var(--surface2)' }}>

          {/* Thesis intact */}
          <div>
            <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:8 }}>1. Thesis still intact?</div>
            <div style={{ display:'flex', gap:8 }}>
              {[{val:true,label:'✓ Yes',color:'var(--gain)',bg:'var(--gain-bg)'},{val:false,label:'✗ No',color:'var(--loss)',bg:'var(--loss-bg)'}].map(opt => (
                <button key={String(opt.val)} onClick={() => update('thesisIntact', opt.val)}
                  style={{ padding:'7px 18px', borderRadius:7, fontSize:12, fontWeight:600, border:'1px solid',
                    borderColor: review.thesisIntact===opt.val ? opt.color : 'var(--border)',
                    background: review.thesisIntact===opt.val ? opt.bg : 'transparent',
                    color: review.thesisIntact===opt.val ? opt.color : 'var(--muted)', cursor:'pointer', transition:'all .15s' }}>
                  {opt.label}
                </button>
              ))}
            </div>
          </div>

          {/* Quarterly result */}
          <div>
            <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:8 }}>2. Last quarterly result</div>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {RESULT_OPTIONS.map(opt => (
                <button key={opt.value} onClick={() => update('result', opt.value)}
                  style={{ padding:'7px 16px', borderRadius:7, fontSize:12, fontWeight:600, border:'1px solid',
                    borderColor: review.result===opt.value ? opt.color : 'var(--border)',
                    background: review.result===opt.value ? opt.bg : 'transparent',
                    color: review.result===opt.value ? opt.color : 'var(--muted)', cursor:'pointer', transition:'all .15s' }}>
                  {opt.label}
                </button>
              ))}
            </div>
          </div>

          {/* Conviction delta */}
          <div>
            <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:8 }}>3. Conviction change</div>
            <div style={{ display:'flex', gap:8 }}>
              {CONVICTION_DELTA.map(opt => (
                <button key={opt.value} onClick={() => update('convictionDelta', opt.value)}
                  style={{ padding:'7px 16px', borderRadius:7, fontSize:12, fontWeight:600, border:'1px solid',
                    borderColor: review.convictionDelta===opt.value ? opt.color : 'var(--border)',
                    background: review.convictionDelta===opt.value ? 'var(--surface2)' : 'transparent',
                    color: review.convictionDelta===opt.value ? opt.color : 'var(--muted)', cursor:'pointer', transition:'all .15s' }}>
                  {opt.label}
                </button>
              ))}
            </div>
          </div>

          {/* Action */}
          <div>
            <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:8 }}>4. Action this quarter</div>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {ACTIONS.map(opt => (
                <button key={opt.value} onClick={() => update('action', opt.value)}
                  style={{ padding:'7px 16px', borderRadius:7, fontSize:12, fontWeight:600, border:'1px solid',
                    borderColor: review.action===opt.value ? opt.color : 'var(--border)',
                    background: review.action===opt.value ? 'var(--surface2)' : 'transparent',
                    color: review.action===opt.value ? opt.color : 'var(--muted)', cursor:'pointer', transition:'all .15s' }}>
                  {opt.label}
                </button>
              ))}
            </div>
          </div>

          {/* Notes */}
          <div>
            <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6 }}>Notes for this quarter</div>
            <textarea value={review.notes || ''} rows={3}
              onChange={e => update('notes', e.target.value)}
              placeholder="Key observations, management comments, triggers to watch…"
              style={{ width:'100%', background:'var(--card)', border:'1px solid var(--border)', borderRadius:7, padding:'8px 10px', fontSize:12, color:'var(--text)', resize:'vertical', fontFamily:'var(--font-sans)', outline:'none' }} />
          </div>

          {/* Reset */}
          <div style={{ display:'flex', justifyContent:'flex-end' }}>
            <button onClick={() => onChange({})}
              style={{ padding:'6px 12px', background:'transparent', border:'1px solid var(--border)', borderRadius:7, color:'var(--muted)', fontSize:12, cursor:'pointer' }}>
              Reset review
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function QuarterlyReview({ data }) {
  const reviewableAssets = data.assets.filter(a => a.invested > 0 && a.category !== 'Cash');
  const [quarter, setQuarter] = useState(QUARTERS[QUARTERS.length - 1]);
  const [reviews, setReviews] = useState(() => {
    try { return JSON.parse(localStorage.getItem('px-reviews')) || {}; } catch(e) { return {}; }
  });

  function updateReview(assetId, review) {
    const next = { ...reviews, [assetId]: review };
    setReviews(next);
    localStorage.setItem('px-reviews', JSON.stringify(next));
  }

  const completedCount = reviewableAssets.filter(a => {
    const r = reviews[a.id] || {};
    return r.thesisIntact !== undefined && r.result && r.convictionDelta && r.action;
  }).length;

  const actionSummary = ACTIONS.map(opt => ({
    ...opt, count: reviewableAssets.filter(a => (reviews[a.id]||{}).action === opt.value).length
  })).filter(o => o.count > 0);

  return (
    <div style={{ padding:'20px 24px', display:'flex', flexDirection:'column', gap:16 }}>

      {/* Quarter selector + progress */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12 }}>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
          {QUARTERS.map(q => (
            <button key={q} onClick={() => setQuarter(q)}
              style={{ padding:'5px 12px', borderRadius:99, fontSize:11, fontWeight: quarter===q?700:400, border:'1px solid',
                borderColor: quarter===q ? 'var(--accent)' : 'var(--border)',
                background: quarter===q ? 'var(--accent-muted)' : 'transparent',
                color: quarter===q ? 'var(--accent)' : 'var(--muted)', cursor:'pointer', transition:'all .15s' }}>
              {q}
            </button>
          ))}
        </div>
        <div style={{ fontSize:13, color:'var(--muted)' }}>
          <span style={{ color:'var(--gain)', fontWeight:700 }}>{completedCount}</span>/{reviewableAssets.length} reviewed
        </div>
      </div>

      {/* Progress bar */}
      <div style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:10, padding:'14px 18px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
          <span style={{ fontSize:12, fontWeight:600, color:'var(--text)' }}>Review Progress — {quarter}</span>
          <span style={{ fontSize:12, color:'var(--muted)' }}>{Math.round(completedCount/reviewableAssets.length*100)}% complete</span>
        </div>
        <div style={{ height:8, background:'var(--border)', borderRadius:99, overflow:'hidden', marginBottom:12 }}>
          <div style={{ width:`${completedCount/reviewableAssets.length*100}%`, height:'100%', background:'var(--gain)', borderRadius:99, transition:'width .4s' }} />
        </div>
        {actionSummary.length > 0 && (
          <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
            {actionSummary.map(a => (
              <span key={a.value} style={{ fontSize:11, padding:'3px 10px', borderRadius:99, background:'var(--surface2)', border:`1px solid ${a.color}`, color:a.color, fontWeight:600 }}>
                {a.label} × {a.count}
              </span>
            ))}
          </div>
        )}
      </div>

      {/* Review cards */}
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {reviewableAssets.map(a => (
          <ReviewCard key={a.id} asset={a} review={reviews[a.id] || {}} onChange={rev => updateReview(a.id, rev)} />
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { QuarterlyReview });

  </script>

  <!-- ─── app.jsx ─────────────────────────────────── -->
  <script type="text/babel">
// Main App — theme system + routing + tweaks
const { useState, useEffect, useCallback } = React;

// ── Theme definitions ─────────────────────────────────────
const THEMES = {
  'Console Dark': {
    '--bg':          '#0C0E12',
    '--surface':     '#111318',
    '--surface2':    '#1A1D24',
    '--card':        '#161921',
    '--sidebar':     '#0C0E12',
    '--border':      'rgba(255,255,255,0.07)',
    '--text':        '#EDF0F5',
    '--muted':       '#7A7F96',
    '--accent':      'oklch(0.52 0.19 15)',
    '--accent-muted':'rgba(192,57,43,0.12)',
    '--gain':        'oklch(0.62 0.14 160)',
    '--gain-bg':     'rgba(27,138,90,0.15)',
    '--loss':        'oklch(0.58 0.20 15)',
    '--loss-bg':     'rgba(192,57,43,0.15)',
    '--warn':        'oklch(0.72 0.14 75)',
    '--warn-bg':     'rgba(185,130,0,0.15)',
    '--info':        'oklch(0.64 0.14 248)',
    '--info-bg':     'rgba(37,99,200,0.15)',
  },
  'Pro Light': {
    '--bg':          '#F0F2F6',
    '--surface':     '#FFFFFF',
    '--surface2':    '#F5F6FA',
    '--card':        '#FFFFFF',
    '--sidebar':     '#FFFFFF',
    '--border':      '#E3E6EE',
    '--text':        '#0F1117',
    '--muted':       '#6B7280',
    '--accent':      'oklch(0.50 0.19 15)',
    '--accent-muted':'rgba(192,57,43,0.08)',
    '--gain':        'oklch(0.45 0.15 160)',
    '--gain-bg':     'rgba(22,101,52,0.08)',
    '--loss':        'oklch(0.50 0.19 15)',
    '--loss-bg':     'rgba(192,57,43,0.08)',
    '--warn':        'oklch(0.52 0.13 75)',
    '--warn-bg':     'rgba(130,90,0,0.08)',
    '--info':        'oklch(0.48 0.14 248)',
    '--info-bg':     'rgba(29,78,216,0.08)',
  },
  'Midnight': {
    '--bg':          '#060810',
    '--surface':     '#0A0D16',
    '--surface2':    '#131825',
    '--card':        '#0F1320',
    '--sidebar':     '#080B14',
    '--border':      'rgba(255,255,255,0.06)',
    '--text':        '#E8EBF2',
    '--muted':       '#606880',
    '--accent':      'oklch(0.58 0.22 12)',
    '--accent-muted':'rgba(220,38,38,0.14)',
    '--gain':        'oklch(0.64 0.16 155)',
    '--gain-bg':     'rgba(22,163,74,0.14)',
    '--loss':        'oklch(0.60 0.22 12)',
    '--loss-bg':     'rgba(220,38,38,0.14)',
    '--warn':        'oklch(0.74 0.16 72)',
    '--warn-bg':     'rgba(202,138,4,0.14)',
    '--info':        'oklch(0.66 0.16 245)',
    '--info-bg':     'rgba(59,130,246,0.14)',
  },
};

const SAVED_PAGE = localStorage.getItem('px-page') || 'dashboard';
const SAVED_THEME = localStorage.getItem('px-theme') || 'Console Dark';
const SAVED_COLLAPSED = localStorage.getItem('px-collapsed') === 'true';

function App() {
  const [page, setPage] = useState(SAVED_PAGE);
  const [themeName, setThemeName] = useState(SAVED_THEME);
  const [collapsed, setCollapsed] = useState(SAVED_COLLAPSED);
  const [searchQuery, setSearchQuery] = useState('');
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [density, setDensity] = useState('compact');

  const theme = THEMES[themeName];
  const isDark = themeName !== 'Pro Light';

  // Persist nav state
  useEffect(() => { localStorage.setItem('px-page', page); }, [page]);
  useEffect(() => { localStorage.setItem('px-theme', themeName); }, [themeName]);
  useEffect(() => { localStorage.setItem('px-collapsed', collapsed); }, [collapsed]);

  // Apply theme CSS vars to :root
  useEffect(() => {
    const root = document.documentElement;
    Object.entries(theme).forEach(([k, v]) => root.style.setProperty(k, v));
    root.style.setProperty('color-scheme', isDark ? 'dark' : 'light');
  }, [themeName]);

  // Tweaks edit-mode protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const data = window.phoenixData;

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: 'var(--bg)', fontFamily: 'var(--font-sans)', color: 'var(--text)' }}>

      {/* Sidebar */}
      <Sidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed} />

      {/* Main */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
        <TopBar page={page} darkMode={isDark} setDarkMode={() => setThemeName(t => t === 'Pro Light' ? 'Console Dark' : 'Pro Light')} searchQuery={searchQuery} setSearchQuery={setSearchQuery} />

        {/* Screen content */}
        <div style={{ flex: 1, overflowY: page === 'reports' ? 'hidden' : 'auto' }}>
          {page === 'dashboard' && <Dashboard      data={data} searchQuery={searchQuery} />}
          {page === 'portfolio' && <Portfolio      data={data} searchQuery={searchQuery} />}
          {page === 'compare'   && <Compare        data={data} />}
          {page === 'analysis'  && <Analysis       data={data} />}
          {page === 'reports'   && <Reports        data={data} searchQuery={searchQuery} />}
          {page === 'watchlist' && <Watchlist      data={data} />}
          {page === 'journal'   && <Journal        data={data} />}
          {page === 'tools'     && <Tools          data={data} />}
          {page === 'review'    && <QuarterlyReview data={data} />}
        </div>
      </div>

      {/* ── Tweaks Panel ──────────────────────────────────── */}
      {tweaksOpen && (
        <div style={{ position: 'fixed', bottom: 20, right: 20, width: 280, background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 14, boxShadow: '0 12px 48px rgba(0,0,0,0.32)', zIndex: 1000, overflow: 'hidden' }}>
          <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', fontSize: 12, fontWeight: 700, color: 'var(--muted)', letterSpacing: '.08em', textTransform: 'uppercase', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            Tweaks
            <button onClick={() => setTweaksOpen(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)', fontSize: 16, lineHeight: 1 }}>×</button>
          </div>

          {/* Theme */}
          <div style={{ padding: '14px 16px', borderBottom: '1px solid var(--border)' }}>
            <div style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 10 }}>Theme</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {Object.keys(THEMES).map(name => (
                <button key={name} onClick={() => { setThemeName(name); window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: name } }, '*'); }}
                  style={{ padding: '8px 12px', borderRadius: 8, border: `1px solid ${themeName === name ? 'var(--accent)' : 'var(--border)'}`,
                    background: themeName === name ? 'var(--accent-muted)' : 'var(--surface2)',
                    color: themeName === name ? 'var(--accent)' : 'var(--text)', cursor: 'pointer', fontSize: 13, fontWeight: themeName === name ? 700 : 400,
                    textAlign: 'left', transition: 'all .15s', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  {name}
                  {themeName === name && <span style={{ fontSize: 10, opacity: .7 }}>ACTIVE</span>}
                </button>
              ))}
            </div>
          </div>

          {/* Sidebar */}
          <div style={{ padding: '14px 16px', borderBottom: '1px solid var(--border)' }}>
            <div style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 10 }}>Sidebar</div>
            <div style={{ display: 'flex', gap: 8 }}>
              {[['Expanded', false], ['Collapsed', true]].map(([label, val]) => (
                <button key={label} onClick={() => setCollapsed(val)}
                  style={{ flex: 1, padding: '7px', borderRadius: 7, border: `1px solid ${collapsed === val ? 'var(--accent)' : 'var(--border)'}`,
                    background: collapsed === val ? 'var(--accent-muted)' : 'var(--surface2)',
                    color: collapsed === val ? 'var(--accent)' : 'var(--muted)', cursor: 'pointer', fontSize: 12, fontWeight: collapsed === val ? 700 : 400, transition: 'all .15s' }}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* Navigation shortcuts */}
          <div style={{ padding: '14px 16px' }}>
            <div style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 10 }}>Jump to screen</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
              {['dashboard','portfolio','compare','analysis','reports','watchlist','journal','tools','review'].map(p => (
                <button key={p} onClick={() => setPage(p)}
                  style={{ padding: '7px', borderRadius: 7, border: `1px solid ${page === p ? 'var(--accent)' : 'var(--border)'}`,
                    background: page === p ? 'var(--accent-muted)' : 'var(--surface2)',
                    color: page === p ? 'var(--accent)' : 'var(--muted)', cursor: 'pointer', fontSize: 12, fontWeight: page === p ? 700 : 400,
                    textTransform: 'capitalize', transition: 'all .15s' }}>
                  {p}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
