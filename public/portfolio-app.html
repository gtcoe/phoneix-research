  <script type="text/babel">
// Compare Screen — Portfolio vs Benchmarks
const { useState, useMemo } = React;

function Compare({ data }) {
  const { history, netWorth, totalInvested, xirr, cagr, alpha, assets } = data;
  const benchmarks = data.benchmarks || {
    nifty50:   { label:'Nifty 50',         color:'oklch(0.64 0.14 248)', xirr:12.0, cagr:12.0, history: history },
    midcap150: { label:'Nifty Midcap 150', color:'oklch(0.72 0.14 75)',  xirr:18.2, cagr:18.2, history: history },
    fd:        { label:'Fixed Deposit',     color:'oklch(0.68 0.08 240)', xirr:7.2,  cagr:7.2,  history: history },
  };
  const [activeBenchmarks, setActiveBenchmarks] = useState(['nifty50', 'midcap150', 'fd']);
  const [hovered, setHovered] = useState(null);
  const [tab, setTab] = useState('growth');

  const toggleBenchmark = (key) => {
    setActiveBenchmarks(prev =>
      prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]
    );
  };

  // ── Combined chart data ──────────────────────────────────────────────────
  const chartLines = useMemo(() => {
    const lines = [
      { key: 'portfolio', label: 'My Portfolio', color: 'var(--accent)', data: history, xirr, cagr }
    ];
    Object.entries(benchmarks).forEach(([key, bm]) => {
      if (activeBenchmarks.includes(key)) {
        lines.push({ key, label: bm.label, color: bm.color, data: bm.history, xirr: bm.xirr, cagr: bm.cagr });
      }
    });
    return lines;
  }, [activeBenchmarks, history, benchmarks]);

  // ── Multi-line SVG chart ─────────────────────────────────────────────────
  const W = 860, H = 240, padL = 56, padR = 16, padT = 16, padB = 32;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const n = history.length;

  const allVals = chartLines.flatMap(l => l.data.map(d => d.value));
  const minV = Math.min(...allVals) * 0.97;
  const maxV = Math.max(...allVals) * 1.01;
  const range = maxV - minV;

  const toX = i => padL + (i / (n - 1)) * chartW;
  const toY = v => padT + chartH - ((v - minV) / range) * chartH;

  const yTicks = 4;
  const yLabels = Array.from({ length: yTicks + 1 }, (_, i) => {
    const v = minV + (range * i / yTicks);
    return { y: toY(v), label: fmt(v) };
  }).reverse();

  const xLabels = history.filter((_, i) => i % 3 === 0 || i === n - 1);

  // Per-holding excess return vs Nifty
  const equityAssets = assets.filter(a => a.rec && a.xirr !== null);
  const niftyXIRR = benchmarks.nifty50.xirr;
  const midcapXIRR = benchmarks.midcap150.xirr;

  // Simulated drawdown for portfolio vs Nifty
  const drawdowns = history.slice(1).map((d, i) => {
    const prev = history[i];
    const portRet = (d.value - prev.value) / prev.value * 100;
    const niftyD = benchmarks.nifty50.history;
    const niftyRet = (niftyD[i+1].value - niftyD[i].value) / niftyD[i].value * 100;
    return { date: d.date, portfolio: portRet, nifty: niftyRet, excess: portRet - niftyRet };
  });

  return (
    <div style={{ padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>

      {/* ── Header metrics ────────────────────────────────────────── */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 12 }}>
        {[
          { label: 'Portfolio XIRR',    value: fmtPct(xirr, 2),   sub: 'real cashflow-weighted', subColor: 'var(--gain)', accent: true },
          { label: 'vs Nifty 50',       value: fmtPct(xirr - benchmarks.nifty50.xirr, 2),   sub: `Nifty: ${fmtPct(benchmarks.nifty50.xirr,1)}`,   subColor: (xirr - benchmarks.nifty50.xirr) >= 0 ? 'var(--gain)' : 'var(--loss)' },
          { label: 'vs Midcap 150',     value: fmtPct(xirr - benchmarks.midcap150.xirr, 2), sub: `Midcap: ${fmtPct(benchmarks.midcap150.xirr,1)}`, subColor: (xirr - benchmarks.midcap150.xirr) >= 0 ? 'var(--gain)' : 'var(--loss)' },
          { label: 'vs Fixed Deposit',  value: fmtPct(xirr - benchmarks.fd.xirr, 2),        sub: `FD: ${fmtPct(benchmarks.fd.xirr,1)}`,            subColor: (xirr - benchmarks.fd.xirr) >= 0 ? 'var(--gain)' : 'var(--loss)' },
        ].map(s => <StatCard key={s.label} {...s} />)}
      </div>

      {/* ── Tab bar ───────────────────────────────────────────────── */}
      <TabBar
        tabs={[{ id: 'growth', label: 'Cumulative Growth' }, { id: 'monthly', label: 'Monthly Excess Returns' }, { id: 'holdings', label: 'Holding-level Alpha' }]}
        active={tab} onChange={setTab}
      />

      {/* ── Growth Chart ──────────────────────────────────────────── */}
      {tab === 'growth' && (
        <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: '20px 24px' }}>
          {/* Legend + toggles */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, flexWrap: 'wrap' }}>
            {/* Portfolio (always on) */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ width: 20, height: 2, background: 'var(--accent)', display: 'inline-block', borderRadius: 1 }} />
              <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--text)' }}>My Portfolio</span>
              <span style={{ fontSize: 11, color: 'var(--gain)', fontFamily: 'var(--font-mono)', marginLeft: 2 }}>XIRR {fmtPct(xirr,1)}</span>
            </div>
            {Object.entries(benchmarks).map(([key, bm]) => {
              const active = activeBenchmarks.includes(key);
              return (
                <button key={key} onClick={() => toggleBenchmark(key)}
                  style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '4px 10px', borderRadius: 7,
                    border: `1px solid ${active ? bm.color : 'var(--border)'}`,
                    background: active ? `${bm.color}18` : 'transparent',
                    cursor: 'pointer', opacity: active ? 1 : 0.45, transition: 'all .15s' }}>
                  <span style={{ width: active ? 20 : 12, height: 2, background: bm.color, display: 'inline-block', borderRadius: 1, transition: 'width .2s' }} />
                  <span style={{ fontSize: 12, color: active ? 'var(--text)' : 'var(--muted)', fontWeight: active ? 600 : 400 }}>{bm.label}</span>
                  <span style={{ fontSize: 11, color: bm.color, fontFamily: 'var(--font-mono)' }}>{fmtPct(bm.xirr,1)}</span>
                </button>
              );
            })}
          </div>

          {/* SVG multi-line chart */}
          <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: 'block', overflow: 'visible' }}
            onMouseMove={e => {
              const rect = e.currentTarget.getBoundingClientRect();
              const mx = (e.clientX - rect.left) * (W / rect.width) - padL;
              setHovered(Math.max(0, Math.min(n - 1, Math.round((mx / chartW) * (n - 1)))));
            }}
            onMouseLeave={() => setHovered(null)}>

            {/* Grid */}
            {yLabels.map((t, i) => (
              <g key={i}>
                <line x1={padL} y1={t.y} x2={padL + chartW} y2={t.y} stroke="var(--border)" strokeWidth="1" strokeDasharray="3,4" />
                <text x={padL - 6} y={t.y + 4} textAnchor="end" fontSize="10" fill="var(--muted)" fontFamily="var(--font-mono)">{t.label}</text>
              </g>
            ))}
            {xLabels.map((d, i) => {
              const idx = history.indexOf(d);
              return <text key={i} x={toX(idx)} y={padT + chartH + 20} textAnchor="middle" fontSize="10" fill="var(--muted)" fontFamily="var(--font-mono)">{d.date}</text>;
            })}

            {/* Lines */}
            {chartLines.map(line => {
              const pts = line.data.map((d, i) => [toX(i), toY(d.value)]);
              const path = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
              const area = path + ` L${pts[pts.length-1][0].toFixed(1)},${(padT+chartH).toFixed(1)} L${padL},${(padT+chartH).toFixed(1)} Z`;
              const isPortfolio = line.key === 'portfolio';
              return (
                <g key={line.key}>
                  {isPortfolio && <path d={area} fill={line.color} opacity="0.08" />}
                  <path d={path} fill="none" stroke={line.color} strokeWidth={isPortfolio ? 2.5 : 1.5}
                    strokeDasharray={isPortfolio ? 'none' : line.key === 'fd' ? '5,4' : 'none'}
                    strokeLinecap="round" strokeLinejoin="round" />
                </g>
              );
            })}

            {/* Hover crosshair */}
            {hovered !== null && (
              <g>
                <line x1={toX(hovered)} y1={padT} x2={toX(hovered)} y2={padT + chartH}
                  stroke="var(--muted)" strokeWidth="1" strokeDasharray="3,3" />
                {/* Tooltip */}
                <g transform={`translate(${Math.min(toX(hovered) + 10, W - 150)},${padT + 4})`}>
                  <rect x="0" y="0" width="140" height={14 + chartLines.length * 18} rx="6"
                    fill="var(--surface2)" stroke="var(--border)" strokeWidth="1" />
                  <text x="8" y="12" fontSize="9" fill="var(--muted)" fontFamily="var(--font-mono)">{history[hovered].date}</text>
                  {chartLines.map((line, li) => (
                    <g key={line.key} transform={`translate(0,${14 + li * 18})`}>
                      <circle cx="12" cy="8" r="3" fill={line.color} />
                      <text x="20" y="12" fontSize="10" fill="var(--text)" fontFamily="var(--font-mono)">{fmt(line.data[hovered]?.value ?? 0)}</text>
                    </g>
                  ))}
                </g>
                {/* Dots on lines */}
                {chartLines.map(line => (
                  <circle key={line.key} cx={toX(hovered)} cy={toY(line.data[hovered]?.value ?? minV)}
                    r="4" fill={line.color} stroke="var(--surface)" strokeWidth="2" />
                ))}
              </g>
            )}
          </svg>
        </div>
      )}

      {/* ── Monthly Excess Returns ─────────────────────────────────── */}
      {tab === 'monthly' && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: '20px 24px' }}>
            <div style={{ fontSize: 12, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 4 }}>Monthly Alpha vs Nifty 50</div>
            <div style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 16 }}>Positive = outperformed Nifty that month</div>

            {/* Bar chart */}
            <svg width="100%" viewBox="0 0 860 180" style={{ display: 'block', overflow: 'visible' }}>
              {(() => {
                const barW = Math.floor(chartW / drawdowns.length) - 3;
                const maxAbs = Math.max(...drawdowns.map(d => Math.abs(d.excess)), 1);
                const midY = 80, scale = 60;
                return (
                  <g transform="translate(56,0)">
                    <line x1={0} y1={midY} x2={chartW} y2={midY} stroke="var(--border)" strokeWidth="1" />
                    <text x={-6} y={midY + 4} textAnchor="end" fontSize="9" fill="var(--muted)" fontFamily="var(--font-mono)">0%</text>
                    {drawdowns.map((d, i) => {
                      const h = Math.abs(d.excess) / maxAbs * scale;
                      const isPos = d.excess >= 0;
                      return (
                        <g key={i}>
                          <rect
                            x={i * (barW + 3)} y={isPos ? midY - h : midY}
                            width={barW} height={h}
                            fill={isPos ? 'var(--gain)' : 'var(--loss)'} opacity="0.85" rx="2"
                          />
                          {i % 3 === 0 && (
                            <text x={i * (barW + 3) + barW / 2} y={midY + 70} textAnchor="middle" fontSize="9" fill="var(--muted)" fontFamily="var(--font-mono)">{d.date}</text>
                          )}
                        </g>
                      );
                    })}
                  </g>
                );
              })()}
            </svg>

            {/* Summary */}
            <div style={{ display: 'flex', gap: 24, marginTop: 16, flexWrap: 'wrap' }}>
              {[
                { label: 'Months outperformed', value: drawdowns.filter(d => d.excess > 0).length, color: 'var(--gain)' },
                { label: 'Months underperformed', value: drawdowns.filter(d => d.excess < 0).length, color: 'var(--loss)' },
                { label: 'Best month alpha', value: fmtPct(Math.max(...drawdowns.map(d => d.excess))), color: 'var(--gain)' },
                { label: 'Worst month alpha', value: fmtPct(Math.min(...drawdowns.map(d => d.excess))), color: 'var(--loss)' },
                { label: 'Avg monthly alpha', value: fmtPct(drawdowns.reduce((s,d)=>s+d.excess,0)/drawdowns.length), color: 'var(--text)' },
              ].map(m => (
                <div key={m.label} style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '.06em', textTransform: 'uppercase', marginBottom: 2 }}>{m.label}</div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: m.color, fontFamily: 'var(--font-mono)' }}>{m.value}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── Holding-level alpha ────────────────────────────────────── */}
      {tab === 'holdings' && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: '20px 24px' }}>
            <div style={{ fontSize: 12, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 16 }}>
              Individual Stock XIRR vs Benchmarks
            </div>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ background: 'var(--surface2)' }}>
                  {['Stock','XIRR','vs Nifty','vs Midcap','Signal','Conviction'].map(h => (
                    <th key={h} style={{ fontSize: 10, color: 'var(--muted)', padding: '8px 12px', textAlign: h === 'Stock' ? 'left' : 'right', letterSpacing: '.04em', textTransform: 'uppercase', fontWeight: 600, borderBottom: '1px solid var(--border)', whiteSpace: 'nowrap' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[...equityAssets].sort((a, b) => (b.xirr ?? 0) - (a.xirr ?? 0)).map(a => {
                  const vsNifty = (a.xirr ?? 0) - niftyXIRR;
                  const vsMid   = (a.xirr ?? 0) - midcapXIRR;
                  const td = (v, color) => (
                    <td style={{ padding: '10px 12px', fontSize: 13, textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 600, color, borderBottom: '1px solid var(--border)' }}>{v}</td>
                  );
                  return (
                    <tr key={a.id}
                      onMouseEnter={e => e.currentTarget.style.background = 'var(--surface2)'}
                      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                      <td style={{ padding: '10px 12px', borderBottom: '1px solid var(--border)' }}>
                        <div style={{ fontWeight: 600, fontSize: 13, color: 'var(--text)' }}>{a.name}</div>
                        <div style={{ fontSize: 10, color: 'var(--muted)', fontFamily: 'var(--font-mono)', marginTop: 1 }}>{a.exchange}:{a.ticker}</div>
                      </td>
                      {td(fmtPct(a.xirr ?? 0, 1), a.xirr >= 0 ? 'var(--gain)' : 'var(--loss)')}
                      {td(fmtPct(vsNifty, 1), vsNifty >= 0 ? 'var(--gain)' : 'var(--loss)')}
                      {td(fmtPct(vsMid, 1),   vsMid   >= 0 ? 'var(--gain)' : 'var(--loss)')}
                      <td style={{ padding: '10px 12px', textAlign: 'right', borderBottom: '1px solid var(--border)' }}>
                        {a.rec && <Badge rec={a.rec} size="xs" />}
                      </td>
                      <td style={{ padding: '10px 12px', textAlign: 'right', borderBottom: '1px solid var(--border)' }}>
                        <ConvictionDot score={a.conviction} />
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Alpha waterfall */}
          <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: '20px 24px' }}>
            <div style={{ fontSize: 12, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 16 }}>XIRR vs Nifty 50 — Sorted</div>
            {[...equityAssets].sort((a, b) => ((b.xirr??0) - niftyXIRR) - ((a.xirr??0) - niftyXIRR)).map(a => {
              const excess = (a.xirr ?? 0) - niftyXIRR;
              const maxExcess = 40;
              const barPct = Math.min(Math.abs(excess) / maxExcess * 100, 100);
              return (
                <div key={a.id} style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 10 }}>
                  <span style={{ width: 140, fontSize: 12, color: 'var(--muted)', textAlign: 'right', flexShrink: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{a.ticker}</span>
                  <div style={{ flex: 1, display: 'flex', alignItems: 'center', position: 'relative', height: 20 }}>
                    <div style={{ position: 'absolute', left: '50%', top: 0, bottom: 0, width: 1, background: 'var(--border)' }} />
                    {excess >= 0 ? (
                      <div style={{ marginLeft: '50%', width: `${barPct / 2}%`, height: '100%', background: 'var(--gain)', borderRadius: '0 4px 4px 0', minWidth: 4 }} />
                    ) : (
                      <div style={{ marginLeft: `calc(50% - ${barPct / 2}%)`, width: `${barPct / 2}%`, height: '100%', background: 'var(--loss)', borderRadius: '4px 0 0 4px', minWidth: 4 }} />
                    )}
                  </div>
                  <span style={{ width: 54, fontSize: 12, fontFamily: 'var(--font-mono)', fontWeight: 700, color: excess >= 0 ? 'var(--gain)' : 'var(--loss)' }}>{excess >= 0 ? '+' : ''}{excess.toFixed(1)}%</span>
                </div>
              );
            })}
            <div style={{ marginTop: 12, fontSize: 11, color: 'var(--muted)', textAlign: 'center' }}>Nifty 50 XIRR baseline: {fmtPct(niftyXIRR, 1)}</div>
          </div>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { Compare });

  </script>

  <script type="text/babel">
// Reports Screen — sidebar list + iframe viewer
const { useState, useMemo } = React;

function Reports({ data, searchQuery }) {
  const { reports } = data;
  const [selected, setSelected] = useState(reports[0]);
  const [recFilter, setRecFilter] = useState('all');

  const filtered = useMemo(() => {
    let list = reports;
    if (recFilter !== 'all') list = list.filter(r => r.rec === recFilter);
    if (searchQuery) list = list.filter(r =>
      r.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
      r.ticker.toLowerCase().includes(searchQuery.toLowerCase()) ||
      r.sector.toLowerCase().includes(searchQuery.toLowerCase())
    );
    return list;
  }, [reports, recFilter, searchQuery]);

  const recColors = { buy: 'var(--gain)', hold: 'var(--warn)', watch: 'var(--info)' };

  return (
    <div style={{ display: 'flex', height: 'calc(100vh - 56px)', overflow: 'hidden' }}>

      {/* ── Left: Report list ─────────────────────────────── */}
      <div style={{ width: 280, flexShrink: 0, borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', background: 'var(--surface)', overflow: 'hidden' }}>
        {/* Filter pills */}
        <div style={{ padding: '12px 14px', borderBottom: '1px solid var(--border)', display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {['all','buy','hold','watch'].map(r => (
            <button key={r} onClick={() => setRecFilter(r)}
              style={{ padding: '4px 10px', fontSize: 11, fontWeight: 600, borderRadius: 99, border: '1px solid',
                borderColor: recFilter === r ? (r==='all' ? 'var(--accent)' : recColors[r]||'var(--accent)') : 'var(--border)',
                background: recFilter === r ? (r==='all' ? 'var(--accent-muted)' : r==='buy' ? 'var(--gain-bg)' : r==='hold' ? 'var(--warn-bg)' : 'var(--info-bg)') : 'transparent',
                color: recFilter === r ? (r==='all' ? 'var(--accent)' : recColors[r]||'var(--accent)') : 'var(--muted)',
                cursor: 'pointer', textTransform: 'uppercase', letterSpacing: '.04em', transition: 'all .15s' }}>
              {r}
            </button>
          ))}
        </div>

        {/* Count */}
        <div style={{ padding: '8px 14px', fontSize: 11, color: 'var(--muted)', borderBottom: '1px solid var(--border)' }}>
          {filtered.length} report{filtered.length !== 1 ? 's' : ''}
        </div>

        {/* List */}
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {filtered.length === 0 && (
            <div style={{ padding: 24, textAlign: 'center', color: 'var(--muted)', fontSize: 13 }}>No reports match</div>
          )}
          {filtered.map((r, i) => {
            const isActive = selected?.slug === r.slug;
            return (
              <div key={r.slug} onClick={() => setSelected(r)}
                style={{
                  padding: '12px 14px', borderBottom: '1px solid var(--border)', cursor: 'pointer',
                  background: isActive ? 'var(--accent-muted)' : 'transparent',
                  borderLeft: `3px solid ${isActive ? 'var(--accent)' : 'transparent'}`,
                  transition: 'background .15s',
                }}
                onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = 'var(--surface2)'; }}
                onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = 'transparent'; }}
              >
                <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 6 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: isActive ? 700 : 600, color: isActive ? 'var(--accent)' : 'var(--text)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.name}</div>
                    <div style={{ fontSize: 10, color: 'var(--muted)', fontFamily: 'var(--font-mono)', marginTop: 2 }}>{r.ticker} · {r.date}</div>
                    <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>{r.sector}</div>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4, flexShrink: 0 }}>
                    <Badge rec={r.rec} size="xs" />
                    <ConvictionDot score={r.conviction} />
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Right: Viewer ─────────────────────────────────── */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: 'var(--bg)' }}>
        {selected ? (
          <>
            {/* Report header bar */}
            <div style={{ padding: '12px 20px', borderBottom: '1px solid var(--border)', background: 'var(--surface)', display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                  <span style={{ fontSize: 15, fontWeight: 700, color: 'var(--text)' }}>{selected.name}</span>
                  <span style={{ fontSize: 11, color: 'var(--muted)', fontFamily: 'var(--font-mono)', background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 5, padding: '2px 7px' }}>{selected.ticker}</span>
                  <Badge rec={selected.rec} />
                  <ConvictionDot score={selected.conviction} />
                </div>
                <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 3 }}>{selected.sector} · Analyzed {selected.date}</div>
              </div>
              <a href={selected.file} target="_blank" rel="noopener noreferrer"
                style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: 'var(--accent)', textDecoration: 'none', padding: '5px 12px', border: '1px solid var(--accent)', borderRadius: 7, flexShrink: 0, fontWeight: 500, transition: 'background .15s' }}
                onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-muted)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                <Icon name="external" size={13} /> Open full
              </a>
            </div>

            {/* iframe */}
            <iframe
              key={selected.slug}
              src={selected.file}
              title={selected.name}
              style={{ flex: 1, border: 'none', background: '#fff', display: 'block' }}
              sandbox="allow-scripts allow-same-origin"
            />
          </>
        ) : (
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 10, color: 'var(--muted)' }}>
            <Icon name="reports" size={40} color="var(--border)" />
            <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text)' }}>Select a report</div>
            <div style={{ fontSize: 13 }}>Choose from the list on the left</div>
          </div>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { Reports });

  </script>

  <script type="text/babel">
// Watchlist Screen v2 — with price-at-add tracking + since-added performance
const { useState, useMemo } = React;

const STATUS_CFG = {
  watching:   { label:'Watching',   color:'var(--info)',  bg:'var(--info-bg)'  },
  interested: { label:'Interested', color:'var(--warn)',  bg:'var(--warn-bg)'  },
  passed:     { label:'Passed',     color:'var(--muted)', bg:'var(--surface2)' },
};

function Watchlist({ data }) {
  const initList = (data.watchlist || []).map(w => ({
    ...w,
    alertHit: w.currentPrice >= w.alertPrice,
    sinceAdded: w.priceAtAdd ? (w.currentPrice - w.priceAtAdd) / w.priceAtAdd * 100 : null,
  }));

  const [items, setItems] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('px-watchlist'));
      if (saved && saved.length > 0) {
        // Merge saved overrides (status, thesis, alertPrice) with fresh seed data
        return initList.map(w => {
          const s = saved.find(x => x.id === w.id);
          return s ? { ...w, status: s.status || w.status, thesis: s.thesis || w.thesis, alertPrice: s.alertPrice || w.alertPrice } : w;
        });
      }
      return initList;
    } catch(e) { return initList; }
  });
  const [filter, setFilter] = useState('all');
  const [editId, setEditId] = useState(null);
  const [editNote, setEditNote] = useState('');
  const [editAlert, setEditAlert] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [sortKey, setSortKey] = useState('sinceAdded');
  const [newItem, setNewItem] = useState({ ticker:'', name:'', sector:'', thesis:'', alertPrice:'', currentPrice:'' });

  function save(list) { setItems(list); localStorage.setItem('px-watchlist', JSON.stringify(list)); }
  function updateStatus(id, status) { save(items.map(w => w.id===id ? {...w, status} : w)); }
  function startEdit(w) { setEditId(w.id); setEditNote(w.thesis); setEditAlert(w.alertPrice); }
  function commitEdit(id) {
    save(items.map(w => w.id===id ? {...w, thesis:editNote, alertPrice:+editAlert, alertHit:w.currentPrice>=+editAlert} : w));
    setEditId(null);
  }
  function removeItem(id) { save(items.filter(w => w.id !== id)); }
  function addItem() {
    if (!newItem.ticker || !newItem.name) return;
    const now = new Date();
    const addedDate = now.toLocaleDateString('en-IN',{month:'short', day:'numeric', year:'numeric'});
    const curP = +newItem.currentPrice || 0;
    const item = { id:'w'+Date.now(), ...newItem,
      alertPrice:+newItem.alertPrice||0, currentPrice:curP, priceAtAdd:curP,
      addedDate, sinceAdded:0, rec:null, conviction:null, status:'watching', file:null,
      alertHit: curP >= (+newItem.alertPrice||0),
    };
    save([...items, item]);
    setNewItem({ ticker:'', name:'', sector:'', thesis:'', alertPrice:'', currentPrice:'' });
    setShowAdd(false);
  }

  const filtered = useMemo(() => {
    let list = items;
    if (filter === 'alerts') list = list.filter(w => w.alertHit && w.status !== 'passed');
    else if (filter !== 'all') list = list.filter(w => w.status === filter);
    return [...list].sort((a,b) => {
      if (sortKey === 'sinceAdded') return (b.sinceAdded||0) - (a.sinceAdded||0);
      if (sortKey === 'conviction') return (b.conviction||0) - (a.conviction||0);
      if (sortKey === 'addedDate') return new Date(b.addedDate||0) - new Date(a.addedDate||0);
      return 0;
    });
  }, [items, filter, sortKey]);

  const alertCount = items.filter(w => w.alertHit && w.status !== 'passed').length;
  const inp = (s) => ({ background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:6, padding:'5px 9px', fontSize:12, color:'var(--text)', outline:'none', fontFamily:'var(--font-sans)', ...s });

  return (
    <div style={{ padding:'20px 24px', display:'flex', flexDirection:'column', gap:16 }}>

      {/* Controls */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:10 }}>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap', alignItems:'center' }}>
          {[
            {id:'all',label:`All (${items.length})`},
            {id:'watching',label:'Watching'},
            {id:'interested',label:'Interested'},
            {id:'passed',label:'Passed'},
            {id:'alerts',label:`🔔 Alerts (${alertCount})`, highlight:alertCount>0},
          ].map(f=>(
            <button key={f.id} onClick={()=>setFilter(f.id)}
              style={{padding:'5px 13px',borderRadius:99,fontSize:12,fontWeight:filter===f.id?700:400,border:'1px solid',
                borderColor:filter===f.id?'var(--accent)':'var(--border)',
                background:filter===f.id?'var(--accent-muted)':f.highlight?'var(--warn-bg)':'transparent',
                color:filter===f.id?'var(--accent)':f.highlight?'var(--warn)':'var(--muted)',cursor:'pointer',transition:'all .15s'}}>
              {f.label}
            </button>
          ))}
          <select value={sortKey} onChange={e=>setSortKey(e.target.value)} style={inp({cursor:'pointer'})}>
            <option value="sinceAdded">Sort: Since Added</option>
            <option value="conviction">Sort: Conviction</option>
            <option value="addedDate">Sort: Date Added</option>
          </select>
        </div>
        <button onClick={()=>setShowAdd(v=>!v)}
          style={{display:'flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:8,background:'var(--accent)',border:'none',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>
          <Icon name="plus" size={14} color="#fff" /> Add to Watchlist
        </button>
      </div>

      {/* Add form */}
      {showAdd && (
        <div style={{background:'var(--card)',border:'1px solid var(--accent)',borderRadius:12,padding:'16px 20px'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:12}}>Add New Stock to Watchlist</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 2fr 1fr 1fr 1fr',gap:10,marginBottom:10}}>
            <input value={newItem.ticker} onChange={e=>setNewItem(p=>({...p,ticker:e.target.value.toUpperCase()}))} placeholder="Ticker *" style={inp({})} />
            <input value={newItem.name}   onChange={e=>setNewItem(p=>({...p,name:e.target.value}))}   placeholder="Company name *" style={inp({})} />
            <input value={newItem.sector} onChange={e=>setNewItem(p=>({...p,sector:e.target.value}))} placeholder="Sector" style={inp({})} />
            <input type="number" value={newItem.currentPrice} onChange={e=>setNewItem(p=>({...p,currentPrice:e.target.value}))} placeholder="CMP ₹ (sets baseline)" style={inp({fontFamily:'var(--font-mono)'})} />
            <input type="number" value={newItem.alertPrice}   onChange={e=>setNewItem(p=>({...p,alertPrice:e.target.value}))}   placeholder="Alert price ₹" style={inp({fontFamily:'var(--font-mono)'})} />
          </div>
          <textarea value={newItem.thesis} onChange={e=>setNewItem(p=>({...p,thesis:e.target.value}))} placeholder="Investment thesis…" rows={2}
            style={{...inp({width:'100%',resize:'vertical',padding:'7px 9px',marginBottom:10})}} />
          <div style={{display:'flex',gap:8}}>
            <button onClick={addItem} style={{padding:'7px 16px',background:'var(--accent)',border:'none',borderRadius:7,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}}>Add</button>
            <button onClick={()=>setShowAdd(false)} style={{padding:'7px 14px',background:'transparent',border:'1px solid var(--border)',borderRadius:7,color:'var(--muted)',fontSize:13,cursor:'pointer'}}>Cancel</button>
          </div>
        </div>
      )}

      {/* Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(330px,1fr))',gap:12}}>
        {filtered.map(w => {
          const sc = STATUS_CFG[w.status]||STATUS_CFG.watching;
          const alertHit = w.currentPrice >= w.alertPrice && w.alertPrice > 0;
          const upside = w.alertPrice > 0 ? (w.alertPrice - w.currentPrice) / w.currentPrice * 100 : null;
          const since = w.sinceAdded;
          const isEditing = editId === w.id;

          return (
            <div key={w.id} style={{background:'var(--card)',border:`1px solid ${alertHit&&w.status!=='passed'?'var(--warn)':'var(--border)'}`,borderRadius:12,padding:'14px 16px',display:'flex',flexDirection:'column',gap:10,position:'relative'}}>
              {alertHit && w.status!=='passed' && (
                <div style={{position:'absolute',top:10,right:10,fontSize:10,fontWeight:700,color:'var(--warn)',background:'var(--warn-bg)',padding:'2px 8px',borderRadius:99}}>🔔 AT ALERT</div>
              )}

              {/* Header */}
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
                <div style={{minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                    <span style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{w.name}</span>
                    {w.rec && <Badge rec={w.rec} size="xs" />}
                    {w.conviction && <ConvictionDot score={w.conviction} />}
                  </div>
                  <div style={{fontSize:10,color:'var(--muted)',fontFamily:'var(--font-mono)',marginTop:2}}>
                    {w.exchange}:{w.ticker} · {w.sector} · {w.mcap}
                  </div>
                </div>
                <div style={{display:'flex',gap:5,flexShrink:0}}>
                  <button onClick={()=>startEdit(w)} title="Edit" style={{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',padding:2}}
                    onMouseEnter={e=>e.currentTarget.style.color='var(--text)'} onMouseLeave={e=>e.currentTarget.style.color='var(--muted)'}>
                    <Icon name="note" size={14} />
                  </button>
                  <button onClick={()=>removeItem(w.id)} title="Remove" style={{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',padding:2}}
                    onMouseEnter={e=>e.currentTarget.style.color='var(--loss)'} onMouseLeave={e=>e.currentTarget.style.color='var(--muted)'}>
                    <Icon name="trash" size={14} />
                  </button>
                </div>
              </div>

              {/* Price metrics */}
              <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                {/* Added date + price */}
                {w.addedDate && (
                  <div style={{display:'flex',flexDirection:'column',gap:1}}>
                    <span style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>Added</span>
                    <span style={{fontSize:11,color:'var(--muted)'}}>{w.addedDate}</span>
                    {w.priceAtAdd > 0 && <span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--muted)'}}>@ ₹{w.priceAtAdd}</span>}
                  </div>
                )}
                <div>
                  <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>CMP</div>
                  <div style={{fontSize:18,fontWeight:700,color:'var(--text)',fontFamily:'var(--font-mono)'}}>₹{w.currentPrice}</div>
                </div>
                {since !== null && (
                  <div>
                    <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>Since Added</div>
                    <div style={{fontSize:18,fontWeight:700,color:since>=0?'var(--gain)':'var(--loss)',fontFamily:'var(--font-mono)'}}>{since>=0?'+':''}{since.toFixed(1)}%</div>
                  </div>
                )}
                {w.alertPrice > 0 && (
                  <div>
                    <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>Alert</div>
                    <div style={{fontSize:18,fontWeight:700,color:alertHit?'var(--warn)':'var(--info)',fontFamily:'var(--font-mono)'}}>₹{w.alertPrice}</div>
                  </div>
                )}
                {upside !== null && (
                  <div>
                    <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>To Alert</div>
                    <div style={{fontSize:18,fontWeight:700,color:upside>0?'var(--gain)':'var(--loss)',fontFamily:'var(--font-mono)'}}>{upside>0?'+':''}{upside.toFixed(1)}%</div>
                  </div>
                )}
              </div>

              {/* Since-added progress bar */}
              {w.priceAtAdd > 0 && w.currentPrice > 0 && (
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:9,color:'var(--muted)'}}>Added @ ₹{w.priceAtAdd}</span>
                    <span style={{fontSize:9,color:'var(--muted)'}}>Alert @ ₹{w.alertPrice||'—'}</span>
                  </div>
                  <div style={{height:5,background:'var(--border)',borderRadius:99,overflow:'hidden'}}>
                    <div style={{
                      width:`${Math.min(100,w.alertPrice>0?w.currentPrice/w.alertPrice*100:50)}%`,
                      height:'100%',
                      background:alertHit?'var(--warn)':since>=0?'var(--gain)':'var(--loss)',
                      borderRadius:99,transition:'width .4s'}} />
                  </div>
                </div>
              )}

              {/* Thesis / edit */}
              {isEditing ? (
                <div style={{display:'flex',flexDirection:'column',gap:7}}>
                  <textarea value={editNote} onChange={e=>setEditNote(e.target.value)} rows={3}
                    style={{background:'var(--surface2)',border:'1px solid var(--accent)',borderRadius:6,padding:'6px 8px',fontSize:12,color:'var(--text)',resize:'vertical',fontFamily:'var(--font-sans)',outline:'none'}} />
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <span style={{fontSize:11,color:'var(--muted)'}}>Alert ₹</span>
                    <input type="number" value={editAlert} onChange={e=>setEditAlert(e.target.value)}
                      style={{width:80,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'4px 7px',fontSize:12,color:'var(--text)',fontFamily:'var(--font-mono)',outline:'none'}} />
                    <button onClick={()=>commitEdit(w.id)} style={{padding:'4px 12px',background:'var(--accent)',border:'none',borderRadius:6,color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer'}}>Save</button>
                    <button onClick={()=>setEditId(null)} style={{padding:'4px 10px',background:'transparent',border:'1px solid var(--border)',borderRadius:6,color:'var(--muted)',fontSize:12,cursor:'pointer'}}>Cancel</button>
                  </div>
                </div>
              ) : (
                <p style={{fontSize:12,color:'var(--muted)',lineHeight:1.6,margin:0}}>{w.thesis||'No thesis added yet.'}</p>
              )}

              {/* Status + report */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:2}}>
                <div style={{display:'flex',gap:5}}>
                  {Object.keys(STATUS_CFG).map(s=>(
                    <button key={s} onClick={()=>updateStatus(w.id,s)}
                      style={{padding:'3px 9px',borderRadius:99,fontSize:10,fontWeight:600,border:'1px solid',
                        borderColor:w.status===s?sc.color:'var(--border)',
                        background:w.status===s?sc.bg:'transparent',
                        color:w.status===s?sc.color:'var(--muted)',cursor:'pointer',transition:'all .12s'}}>
                      {STATUS_CFG[s].label}
                    </button>
                  ))}
                </div>
                {w.file && (
                  <a href={w.file} target="_blank" rel="noopener noreferrer"
                    style={{fontSize:11,color:'var(--accent)',textDecoration:'none',display:'flex',alignItems:'center',gap:4,fontWeight:500}}>
                    Read report <Icon name="external" size={11} color="var(--accent)" />
                  </a>
                )}
              </div>
            </div>
          );
        })}
        {filtered.length===0 && <EmptyState icon="👁️" title="Nothing here" sub="Adjust filter or add a stock" />}
      </div>
    </div>
  );
}

Object.assign(window, { Watchlist });

  </script>

  <script type="text/babel">
// Trade Journal Screen
const { useState, useMemo } = React;

const TYPE_CFG = {
  buy:  { label:'BUY',  color:'var(--gain)', bg:'var(--gain-bg)'  },
  sell: { label:'SELL', color:'var(--loss)', bg:'var(--loss-bg)'  },
  note: { label:'NOTE', color:'var(--info)', bg:'var(--info-bg)'  },
};

const CATEGORY_COLORS = {
  'NSE Stocks': 'var(--accent)',
  'US Stocks':  'oklch(0.64 0.14 248)',
  'NPS':        'oklch(0.72 0.10 80)',
  'FD':         'oklch(0.68 0.08 100)',
  'Cash':       'var(--muted)',
};

function Journal({ data }) {
  const storedTx = useMemo(() => {
    try { return JSON.parse(localStorage.getItem('px-journal-extra')) || []; } catch(e) { return []; }
  }, []);

  const [extraTx, setExtraTx] = useState(storedTx);
  const [showAdd, setShowAdd]  = useState(false);
  const [filter, setFilter]    = useState('all');
  const [catFilter, setCatFilter] = useState('all');
  const [search, setSearch]    = useState('');
  const [expandedId, setExpandedId] = useState(null);
  const [newTx, setNewTx]      = useState({ date:'', type:'buy', asset:'', ticker:'', amount:'', qty:'', price:'', category:'NSE Stocks', notes:'' });

  const allTx = useMemo(() => {
    const combined = [...(data.transactions || []), ...extraTx];
    return combined.sort(function(a,b){ return (b.dateObj||new Date(b.date)) - (a.dateObj||new Date(a.date)); });
  }, [data.transactions, extraTx]);

  const categories = ['all', ...Array.from(new Set(allTx.map(t => t.category).filter(Boolean)))];

  const filtered = useMemo(() => {
    return allTx.filter(t => {
      if (filter !== 'all' && t.type !== filter) return false;
      if (catFilter !== 'all' && t.category !== catFilter) return false;
      if (search && !(t.asset||'').toLowerCase().includes(search.toLowerCase()) && !(t.ticker||'').toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
  }, [allTx, filter, catFilter, search]);

  function addTx() {
    if (!newTx.date || !newTx.asset) return;
    const tx = {
      ...newTx, id: 'j' + Date.now(),
      amount: +newTx.amount || 0, qty: +newTx.qty || null, price: +newTx.price || null,
      dateObj: new Date(newTx.date),
    };
    const next = [...extraTx, tx];
    setExtraTx(next);
    localStorage.setItem('px-journal-extra', JSON.stringify(next.map(t => ({...t, dateObj: undefined}))));
    setNewTx({ date:'', type:'buy', asset:'', ticker:'', amount:'', qty:'', price:'', category:'NSE Stocks', notes:'' });
    setShowAdd(false);
  }

  function deleteTx(id) {
    const next = extraTx.filter(t => t.id !== id);
    setExtraTx(next);
    localStorage.setItem('px-journal-extra', JSON.stringify(next));
  }

  // Summary stats
  const totalDeployed = allTx.filter(t=>t.type==='buy').reduce((s,t)=>s+t.amount,0);
  const buyCount = allTx.filter(t=>t.type==='buy').length;

  // Monthly summary
  const monthlyMap = {};
  allTx.filter(t=>t.type==='buy').forEach(t => {
    const d = t.dateObj || new Date(t.date);
    const key = d.toLocaleDateString('en-IN',{month:'short',year:'2-digit'});
    monthlyMap[key] = (monthlyMap[key]||0) + t.amount;
  });
  const monthly = Object.entries(monthlyMap).slice(-12);
  const maxMonthly = Math.max(...monthly.map(m=>m[1]));

  const inp = (extra) => ({ background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:6, padding:'5px 9px', fontSize:12, color:'var(--text)', outline:'none', fontFamily:'var(--font-sans)', ...extra });

  return (
    <div style={{ padding:'20px 24px', display:'flex', flexDirection:'column', gap:16 }}>

      {/* Stats strip */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12 }}>
        {[
          { label:'Total Transactions',   value: allTx.length,          sub:null },
          { label:'Total Deployed',        value: fmt(totalDeployed),    sub:`${buyCount} buy orders` },
          { label:'Avg Ticket Size',       value: fmt(Math.round(totalDeployed/buyCount)), sub:'per buy' },
          { label:'Active Since',          value: '3.3 yrs',             sub:'Jan 2021' },
        ].map(s => <StatCard key={s.label} {...s} />)}
      </div>

      {/* Monthly deployment bar chart */}
      <div style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:'16px 20px' }}>
        <div style={{ fontSize:12, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:14 }}>Monthly Capital Deployment</div>
        <div style={{ display:'flex', gap:6, alignItems:'flex-end', height:80 }}>
          {monthly.map(([month, amt], i) => (
            <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
              <div style={{ width:'100%', background:'var(--accent)', borderRadius:'4px 4px 0 0', opacity:.85,
                height: `${Math.round(amt/maxMonthly*72)}px`, minHeight:4, transition:'height .3s',
                cursor:'default', position:'relative' }} title={`${month}: ${fmt(amt)}`} />
              <span style={{ fontSize:8, color:'var(--muted)', fontFamily:'var(--font-mono)', transform:'rotate(-35deg)', transformOrigin:'center', whiteSpace:'nowrap', marginTop:4 }}>{month}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Filters + Add */}
      <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
        <div style={{ display:'flex', gap:6 }}>
          {['all','buy','sell','note'].map(f => (
            <button key={f} onClick={() => setFilter(f)}
              style={{ padding:'5px 12px', borderRadius:99, fontSize:11, fontWeight:filter===f?700:400, border:'1px solid',
                borderColor:filter===f?'var(--accent)':'var(--border)', background:filter===f?'var(--accent-muted)':'transparent',
                color:filter===f?'var(--accent)':'var(--muted)', cursor:'pointer', transition:'all .15s', textTransform:'uppercase', letterSpacing:'.04em' }}>
              {f}
            </button>
          ))}
        </div>
        <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}
          style={{ ...inp({}), cursor:'pointer' }}>
          {categories.map(c => <option key={c} value={c}>{c==='all'?'All categories':c}</option>)}
        </select>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search asset…"
          style={{ ...inp({width:160}) }} />
        <div style={{ flex:1 }} />
        <span style={{ fontSize:12, color:'var(--muted)' }}>{filtered.length} entries</span>
        <button onClick={() => setShowAdd(v=>!v)}
          style={{ display:'flex', alignItems:'center', gap:6, padding:'7px 14px', borderRadius:8, background:'var(--accent)', border:'none', color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer' }}>
          <Icon name="plus" size={14} color="#fff" /> Log Trade
        </button>
      </div>

      {/* Add form */}
      {showAdd && (
        <div style={{ background:'var(--card)', border:'1px solid var(--accent)', borderRadius:12, padding:'16px 20px' }}>
          <div style={{ fontSize:13, fontWeight:700, color:'var(--text)', marginBottom:12 }}>Log New Trade / Note</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr 1fr', gap:10, marginBottom:10 }}>
            <input type="date" value={newTx.date} onChange={e=>setNewTx(p=>({...p,date:e.target.value}))} style={inp({})} />
            <select value={newTx.type} onChange={e=>setNewTx(p=>({...p,type:e.target.value}))} style={{ ...inp({}), cursor:'pointer' }}>
              <option value="buy">BUY</option><option value="sell">SELL</option><option value="note">NOTE</option>
            </select>
            <input value={newTx.asset}  onChange={e=>setNewTx(p=>({...p,asset:e.target.value}))}  placeholder="Asset name *" style={inp({})} />
            <input value={newTx.ticker} onChange={e=>setNewTx(p=>({...p,ticker:e.target.value.toUpperCase()}))} placeholder="Ticker" style={inp({fontFamily:'var(--font-mono)'})} />
            <input type="number" value={newTx.amount} onChange={e=>setNewTx(p=>({...p,amount:e.target.value}))} placeholder="Amount ₹" style={inp({fontFamily:'var(--font-mono)'})} />
            <select value={newTx.category} onChange={e=>setNewTx(p=>({...p,category:e.target.value}))} style={{ ...inp({}), cursor:'pointer' }}>
              {['NSE Stocks','US Stocks','NPS','FD','Cash','Other'].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 4fr', gap:10, marginBottom:10 }}>
            <input type="number" value={newTx.qty}   onChange={e=>setNewTx(p=>({...p,qty:e.target.value}))}   placeholder="Qty" style={inp({fontFamily:'var(--font-mono)'})} />
            <input type="number" value={newTx.price} onChange={e=>setNewTx(p=>({...p,price:e.target.value}))} placeholder="Price ₹" style={inp({fontFamily:'var(--font-mono)'})} />
            <input value={newTx.notes} onChange={e=>setNewTx(p=>({...p,notes:e.target.value}))} placeholder="Your reasoning / notes…" style={inp({})} />
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={addTx} style={{ padding:'7px 16px', background:'var(--accent)', border:'none', borderRadius:7, color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer' }}>Save</button>
            <button onClick={() => setShowAdd(false)} style={{ padding:'7px 14px', background:'transparent', border:'1px solid var(--border)', borderRadius:7, color:'var(--muted)', fontSize:13, cursor:'pointer' }}>Cancel</button>
          </div>
        </div>
      )}

      {/* Transaction list */}
      <div style={{ display:'flex', flexDirection:'column', gap:0, background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, overflow:'hidden' }}>
        {filtered.length === 0 && <EmptyState icon="📋" title="No transactions" sub="Log your first trade above" />}
        {filtered.map((tx, i) => {
          const tc = TYPE_CFG[tx.type] || TYPE_CFG.buy;
          const cc = CATEGORY_COLORS[tx.category] || 'var(--muted)';
          const isExtra = String(tx.id).startsWith('j');
          const isExpanded = expandedId === tx.id;
          const d = tx.dateObj || new Date(tx.date);
          const dateStr = d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });

          return (
            <div key={tx.id} style={{ borderBottom: i < filtered.length-1 ? '1px solid var(--border)' : 'none' }}>
              {/* Main row */}
              <div style={{ display:'flex', alignItems:'center', gap:14, padding:'12px 18px', cursor:'pointer', transition:'background .12s' }}
                onMouseEnter={e => e.currentTarget.style.background='var(--surface2)'}
                onMouseLeave={e => e.currentTarget.style.background='transparent'}
                onClick={() => setExpandedId(isExpanded ? null : tx.id)}>

                {/* Date */}
                <div style={{ width:72, flexShrink:0, textAlign:'right' }}>
                  <div style={{ fontSize:12, fontWeight:600, color:'var(--text)', fontFamily:'var(--font-mono)' }}>{d.getDate()} {d.toLocaleDateString('en-IN',{month:'short'})}</div>
                  <div style={{ fontSize:10, color:'var(--muted)', fontFamily:'var(--font-mono)' }}>{d.getFullYear()}</div>
                </div>

                {/* Vertical line */}
                <div style={{ width:2, height:36, background:'var(--border)', borderRadius:99, flexShrink:0, position:'relative' }}>
                  <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:10, height:10, borderRadius:'50%', background:tc.color, border:'2px solid var(--card)' }} />
                </div>

                {/* Type badge */}
                <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:99, background:tc.bg, color:tc.color, flexShrink:0, letterSpacing:'.04em' }}>{tc.label}</span>

                {/* Asset */}
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                    <span style={{ fontSize:13, fontWeight:600, color:'var(--text)' }}>{tx.asset}</span>
                    {tx.ticker && <span style={{ fontSize:10, color:cc, fontFamily:'var(--font-mono)', background:'var(--surface2)', padding:'1px 6px', borderRadius:4 }}>{tx.ticker}</span>}
                    <span style={{ fontSize:10, color:'var(--muted)', background:'var(--surface2)', padding:'1px 7px', borderRadius:4 }}>{tx.category}</span>
                  </div>
                  {tx.notes && <div style={{ fontSize:11, color:'var(--muted)', marginTop:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:500 }}>{tx.notes}</div>}
                </div>

                {/* Amount */}
                {tx.amount > 0 && (
                  <div style={{ textAlign:'right', flexShrink:0 }}>
                    <div style={{ fontSize:14, fontWeight:700, fontFamily:'var(--font-mono)', color: tx.type==='sell'?'var(--gain)':'var(--text)' }}>{tx.type==='sell'?'+':'-'}{fmt(tx.amount)}</div>
                    {tx.qty && tx.price && <div style={{ fontSize:10, color:'var(--muted)', fontFamily:'var(--font-mono)' }}>{tx.qty} × ₹{tx.price.toLocaleString('en-IN')}</div>}
                  </div>
                )}

                {isExtra && (

                    onMouseLeave={e=>e.currentTarget.style.color='var(--muted)'}>

                  </button>
                )}

                <span style={{ color:'var(--muted)', fontSize:10, flexShrink:0, transform: isExpanded?'rotate(90deg)':'none', transition:'transform .15s' }}>▶</span>
              </div>

              {/* Expanded reasoning */}
              {isExpanded && tx.notes && (
                <div style={{ padding:'12px 18px 14px 106px', background:'var(--surface2)', borderTop:'1px solid var(--border)' }}>
                  <div style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:5 }}>My reasoning at the time</div>
                  <p style={{ fontSize:13, color:'var(--text)', lineHeight:1.7 }}>{tx.notes}</p>
                  <div style={{ display:'flex', gap:20, marginTop:10, flexWrap:'wrap' }}>

                    {tx.price && <div><span style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase' }}>Price</span><div style={{ fontSize:13, fontWeight:600, fontFamily:'var(--font-mono)', color:'var(--text)' }}>₹{tx.price.toLocaleString('en-IN')}</div></div>}
                    {tx.amount > 0 && <div><span style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase' }}>Amount</span><div style={{ fontSize:13, fontWeight:600, fontFamily:'var(--font-mono)', color:'var(--text)' }}>{fmt(tx.amount)}</div></div>}
                    <div><span style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase' }}>Date</span><div style={{ fontSize:13, fontWeight:600, color:'var(--text)' }}>{dateStr}</div></div>

}

  <script type="text/babel">
// Tools Screen — Target Price, What-if Simulator, CSV Import, Export PDF
const { useState, useMemo, useRef } = React;

// ─── Target Price Calculator ────────────────────────────────────────────────
function TargetPriceCalc({ data }) {
  const equityAssets = data.assets.filter(a => a.targetPrice && a.currentPrice);
  const [targets, setTargets] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('px-targets')) || {};
      const out = {};
      equityAssets.forEach(a => { out[a.id] = saved[a.id] !== undefined ? saved[a.id] : a.targetPrice; });
      return out;
    } catch(e) {
      const out = {};
      equityAssets.forEach(a => { out[a.id] = a.targetPrice; });
      return out;
    }
  });

  function setTarget(id, val) {
    const next = { ...targets, [id]: +val };
    setTargets(next);
    localStorage.setItem('px-targets', JSON.stringify(next));
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
      <div style={{ fontSize:13, color:'var(--muted)', marginBottom:4 }}>
        Set target prices for each holding. The app calculates implied upside, required CAGR, and estimated time to target.
      </div>
      {equityAssets.map(a => {
        const cur   = a.currentPrice;
        const entry = a.entryPrice;
        const tgt   = targets[a.id] || a.targetPrice;
        const upside = (tgt - cur) / cur * 100;
        const totalReturn = (tgt - entry) / entry * 100;
        // Time to target at current XIRR (if positive)
        const xirrRate = (a.xirr || 15) / 100;
        const yearsToTarget = xirrRate > 0 ? Math.log(tgt / cur) / Math.log(1 + xirrRate) : null;
        const pctProgress = Math.min(100, Math.max(0, (cur - entry) / (tgt - entry) * 100));

        return (
          <div key={a.id} style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:11, padding:'14px 18px' }}>
            <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12, flexWrap:'wrap', marginBottom:12 }}>
              <div style={{ minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                  <span style={{ fontSize:14, fontWeight:700, color:'var(--text)' }}>{a.name}</span>
                  <Badge rec={a.rec || 'buy'} size="xs" />
                </div>
                <div style={{ fontSize:10, color:'var(--muted)', fontFamily:'var(--font-mono)', marginTop:2 }}>{a.exchange}:{a.ticker}</div>
                {a.targetNote && <div style={{ fontSize:11, color:'var(--muted)', marginTop:4, fontStyle:'italic' }}>{a.targetNote}</div>}
              </div>
              <div style={{ display:'flex', gap:16, flexWrap:'wrap', flexShrink:0 }}>
                {[
                  { label:'Entry',  val:'₹'+entry, color:'var(--muted)' },
                  { label:'CMP',    val:'₹'+cur,   color:'var(--text)' },
                  { label:'Target', val:'₹'+tgt,   color: upside > 0 ? 'var(--gain)' : 'var(--loss)' },
                  { label:'Upside', val:(upside>0?'+':'')+upside.toFixed(1)+'%', color: upside>0?'var(--gain)':'var(--loss)' },
                  { label:'Total Return', val:(totalReturn>0?'+':'')+totalReturn.toFixed(1)+'%', color: totalReturn>0?'var(--gain)':'var(--loss)' },
                ].map(m => (
                  <div key={m.label} style={{ textAlign:'center' }}>
                    <div style={{ fontSize:9, color:'var(--muted)', letterSpacing:'.06em', textTransform:'uppercase' }}>{m.label}</div>
                    <div style={{ fontSize:14, fontWeight:700, color:m.color, fontFamily:'var(--font-mono)' }}>{m.val}</div>
                  </div>
                ))}
                {yearsToTarget !== null && yearsToTarget > 0 && (
                  <div style={{ textAlign:'center' }}>
                    <div style={{ fontSize:9, color:'var(--muted)', letterSpacing:'.06em', textTransform:'uppercase' }}>ETA @ XIRR</div>
                    <div style={{ fontSize:14, fontWeight:700, color:'var(--info)', fontFamily:'var(--font-mono)' }}>{yearsToTarget.toFixed(1)}yr</div>
                  </div>
                )}
              </div>
            </div>

            {/* Progress bar: entry → current → target */}
            <div style={{ position:'relative', marginBottom:8 }}>
              <div style={{ height:8, background:'var(--border)', borderRadius:99, overflow:'hidden' }}>
                <div style={{ width:`${pctProgress}%`, height:'100%', background: pctProgress >= 100 ? 'var(--warn)' : 'var(--gain)', borderRadius:99, transition:'width .4s' }} />
              </div>
              <div style={{ display:'flex', justifyContent:'space-between', marginTop:4 }}>
                <span style={{ fontSize:9, color:'var(--muted)' }}>Entry ₹{entry}</span>
                <span style={{ fontSize:9, color:'var(--gain)', fontWeight:600 }}>{pctProgress.toFixed(0)}% to target</span>
                <span style={{ fontSize:9, color:'var(--muted)' }}>Target ₹{tgt}</span>
              </div>
            </div>

            {/* Target input */}
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ fontSize:12, color:'var(--muted)' }}>Adjust target:</span>
              <input type="number" value={tgt} onChange={e => setTarget(a.id, e.target.value)}
                style={{ width:100, background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:6, padding:'4px 8px', fontSize:13, fontWeight:600, color:'var(--text)', fontFamily:'var(--font-mono)', outline:'none' }} />
              <input type="range" min={entry} max={entry*5} step={Math.max(1,Math.round(entry*0.01))} value={tgt}
                onChange={e => setTarget(a.id, e.target.value)}
                style={{ flex:1, accentColor:'var(--accent)', cursor:'pointer' }} />
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── What-if Simulator ──────────────────────────────────────────────────────
function WhatIfSimulator({ data }) {
  const equityAssets = data.assets.filter(a => a.entryDate && a.xirr !== null && a.invested > 0);
  const [selectedId, setSelectedId] = useState(equityAssets[0]?.id || null);
  const [extraAmount, setExtraAmount] = useState(100000);
  const [extraDate, setExtraDate] = useState('same'); // 'same' | specific month offset

  const selected = equityAssets.find(a => a.id === selectedId);

  const result = useMemo(() => {
    if (!selected || !window.calcXIRR) return null;
    const MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const parts = (selected.entryDate || 'Jan 2024').split(' ');
    const entryD = new Date(parseInt(parts[1],10), MONTHS[parts[0]]||0, 15);
    const TODAY = new Date(2026,3,22);

    // Current XIRR
    const origCFs = [{ amount: -selected.invested, date: entryD }, { amount: selected.current, date: TODAY }];
    const origXIRR = window.calcXIRR(origCFs) || selected.xirr;

    // Return rate from original investment
    const returnRate = selected.current / selected.invested;

    // Extra investment — at entry date, same return rate applies
    const extraCurrent = Math.round(extraAmount * returnRate);
    const newTotal = selected.current + extraCurrent;
    const newInvested = selected.invested + extraAmount;

    // New XIRR with extra
    const newCFs = [{ amount: -selected.invested, date: entryD }, { amount: -extraAmount, date: entryD }, { amount: newTotal, date: TODAY }];
    const newXIRR = window.calcXIRR(newCFs) || origXIRR;

    return {
      origXIRR, newXIRR, origCurrent: selected.current, newCurrent: newTotal,
      origInvested: selected.invested, newInvested, extraCurrent,
      gain: newTotal - newInvested, origGain: selected.current - selected.invested,
      extraGain: extraCurrent - extraAmount,
    };
  }, [selected, extraAmount]);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ fontSize:13, color:'var(--muted)' }}>
        Simulate "what if I had invested more" in any holding at the original entry price. See the impact on portfolio value and XIRR.
      </div>

      {/* Controls */}
      <div style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:'18px 20px', display:'flex', flexDirection:'column', gap:14 }}>
        <div>
          <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:7 }}>Choose a holding</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {equityAssets.map(a => (
              <button key={a.id} onClick={() => setSelectedId(a.id)}
                style={{ padding:'6px 12px', borderRadius:7, fontSize:12, fontWeight: selectedId===a.id ? 700:400, border:'1px solid',
                  borderColor: selectedId===a.id ? 'var(--accent)':'var(--border)',
                  background: selectedId===a.id ? 'var(--accent-muted)':'transparent',
                  color: selectedId===a.id ? 'var(--accent)':'var(--muted)', cursor:'pointer', transition:'all .15s' }}>
                {a.ticker || a.name.split(' ')[0]}
              </button>
            ))}
          </div>
        </div>

        <div>
          <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
            <span style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em' }}>Additional Investment</span>
            <span style={{ fontSize:14, fontWeight:700, color:'var(--text)', fontFamily:'var(--font-mono)' }}>{fmt(extraAmount)}</span>
          </div>
          <input type="range" min={10000} max={1000000} step={10000} value={extraAmount}
            onChange={e => setExtraAmount(+e.target.value)}
            style={{ width:'100%', accentColor:'var(--accent)', cursor:'pointer' }} />
          <div style={{ display:'flex', justifyContent:'space-between', marginTop:3 }}>
            <span style={{ fontSize:10, color:'var(--muted)' }}>₹10K</span>
            <span style={{ fontSize:10, color:'var(--muted)' }}>₹10L</span>
          </div>
        </div>
      </div>

      {/* Results */}
      {result && selected && (
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
          {/* Before */}
          <div style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:'18px 20px' }}>
            <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:12 }}>Current Scenario</div>
            {[
              {label:'Invested',       val:fmt(result.origInvested)},
              {label:'Current Value',  val:fmt(result.origCurrent),  color:'var(--text)'},
              {label:'Gain',           val:'+'+fmt(result.origGain), color:'var(--gain)'},
              {label:'XIRR',           val:fmtPct(result.origXIRR,1),color:'var(--gain)'},
            ].map(m => (
              <div key={m.label} style={{ display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid var(--border)' }}>
                <span style={{ fontSize:12, color:'var(--muted)' }}>{m.label}</span>
                <span style={{ fontSize:13, fontWeight:600, fontFamily:'var(--font-mono)', color:m.color||'var(--text)' }}>{m.val}</span>
              </div>
            ))}
          </div>

          {/* After */}
          <div style={{ background:'var(--card)', border:'1px solid var(--accent)', borderRadius:12, padding:'18px 20px' }}>
            <div style={{ fontSize:11, color:'var(--accent)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:12 }}>What-if Scenario (+{fmt(extraAmount)})</div>
            {[
              {label:'Invested',       val:fmt(result.newInvested)},
              {label:'Current Value',  val:fmt(result.newCurrent),   color:'var(--text)'},
              {label:'Extra gain',     val:'+'+fmt(result.extraGain),color:'var(--gain)'},
              {label:'New XIRR',       val:fmtPct(result.newXIRR,1), color:'var(--gain)'},
            ].map(m => (
              <div key={m.label} style={{ display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid var(--border)' }}>
                <span style={{ fontSize:12, color:'var(--muted)' }}>{m.label}</span>
                <span style={{ fontSize:13, fontWeight:700, fontFamily:'var(--font-mono)', color:m.color||'var(--text)' }}>{m.val}</span>
              </div>
            ))}
          </div>

          {/* Impact summary */}
          <div style={{ gridColumn:'1/-1', background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:10, padding:'12px 16px', display:'flex', gap:24, flexWrap:'wrap' }}>
            <div>
              <div style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em' }}>Extra Value Created</div>
              <div style={{ fontSize:22, fontWeight:800, color:'var(--gain)', fontFamily:'var(--font-mono)' }}>{fmt(result.newCurrent - result.origCurrent)}</div>
            </div>
            <div>
              <div style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em' }}>XIRR Delta</div>
              <div style={{ fontSize:22, fontWeight:800, color: (result.newXIRR-result.origXIRR) >= 0 ? 'var(--gain)' : 'var(--loss)', fontFamily:'var(--font-mono)' }}>
                {(result.newXIRR-result.origXIRR) >= 0 ? '+' : ''}{(result.newXIRR - result.origXIRR).toFixed(2)}%
              </div>
            </div>
            <div style={{ flex:1, display:'flex', alignItems:'center' }}>
              <p style={{ fontSize:12, color:'var(--muted)', lineHeight:1.6 }}>
                If you had invested an extra <b style={{color:'var(--text)'}}>{fmt(extraAmount)}</b> in <b style={{color:'var(--text)'}}>{selected.name}</b> at entry (₹{selected.entryPrice}), your portfolio would be <b style={{color:'var(--gain)'}}>{fmt(result.newCurrent - result.origCurrent)}</b> richer today.
              </p>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── CSV Import ──────────────────────────────────────────────────────────────
function CSVImport({ data }) {
  const [csv, setCsv]         = useState('');
  const [parsed, setParsed]   = useState(null);
  const [error, setError]     = useState('');

  const SAMPLE = `Symbol,Quantity,Average Price,Current Price,Invested,Current Value
SKYGOLD,814,344,423,280016,344202
DEEDEV,437,412,449,179944,196213
EFCIL,562,374,477,210188,268074
WEBELSOLAR,986,325,302,320450,297772
SUBROS,321,436,489,139956,156969`;

  function parse() {
    setError('');
    setParsed(null);
    if (!csv.trim()) { setError('Paste CSV data above first.'); return; }
    try {
      const lines = csv.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const rows = lines.slice(1).map(line => {
        const vals = line.split(',').map(v => v.trim());
        const row = {};
        headers.forEach((h, i) => { row[h] = vals[i]; });
        return row;
      }).filter(r => r.symbol || r.ticker);

      const result = rows.map(r => {
        const ticker   = (r.symbol || r.ticker || '').toUpperCase();
        const qty      = parseFloat(r.quantity || r.qty || 0);
        const avgPrice = parseFloat(r['average price'] || r['avg price'] || r.avgprice || 0);
        const curPrice = parseFloat(r['current price'] || r.curprice || 0);
        const invested = parseFloat(r.invested || r['invested value'] || 0) || qty * avgPrice;
        const current  = parseFloat(r['current value'] || r.currentvalue || 0) || qty * curPrice;
        const gain = current - invested;
        const gainPct = invested > 0 ? gain / invested * 100 : 0;
        const match = data.assets.find(a => a.ticker === ticker);
        return { ticker, qty, avgPrice, curPrice, invested, current, gain, gainPct, matched: !!match, matchName: match?.name };
      });
      setParsed(result);
    } catch(e) {
      setError('Could not parse CSV. Check the format matches the sample below.');
    }
  }

  const tdS = { padding:'8px 12px', fontSize:12, borderBottom:'1px solid var(--border)', fontFamily:'var(--font-mono)' };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ fontSize:13, color:'var(--muted)' }}>
        Paste a CSV export from Zerodha Console, Groww, or any broker. The parser detects Symbol, Quantity, Average Price, and Current Price columns automatically.
      </div>

      <textarea value={csv} onChange={e => setCsv(e.target.value)} rows={8} placeholder="Paste CSV here…"
        style={{ background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:8, padding:'10px 12px', fontSize:12, color:'var(--text)', fontFamily:'var(--font-mono)', resize:'vertical', outline:'none', width:'100%' }} />

      <div style={{ display:'flex', gap:8 }}>
        <button onClick={parse} style={{ padding:'8px 18px', background:'var(--accent)', border:'none', borderRadius:8, color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer' }}>
          Parse CSV
        </button>
        <button onClick={() => setCsv(SAMPLE)} style={{ padding:'8px 14px', background:'transparent', border:'1px solid var(--border)', borderRadius:8, color:'var(--muted)', fontSize:13, cursor:'pointer' }}>
          Load sample
        </button>
        {(csv || parsed) && (
          <button onClick={() => { setCsv(''); setParsed(null); setError(''); }} style={{ padding:'8px 14px', background:'transparent', border:'1px solid var(--border)', borderRadius:8, color:'var(--muted)', fontSize:13, cursor:'pointer' }}>
            Clear
          </button>
        )}
      </div>

      {error && <div style={{ padding:'10px 14px', background:'var(--loss-bg)', border:'1px solid var(--loss)', borderRadius:8, fontSize:12, color:'var(--loss)' }}>{error}</div>}

      {parsed && (
        <div style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, overflow:'hidden' }}>
          <div style={{ padding:'12px 16px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <span style={{ fontSize:13, fontWeight:700, color:'var(--text)' }}>Parsed {parsed.length} holdings</span>
            <span style={{ fontSize:11, color:'var(--muted)' }}>{parsed.filter(r=>r.matched).length} matched to portfolio · {parsed.filter(r=>!r.matched).length} new</span>
          </div>
          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'var(--surface2)' }}>
                {['Ticker','Qty','Avg Price','CMP','Invested','Current','P&L','Status'].map(h=>(
                  <th key={h} style={{ ...tdS, fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.04em', fontWeight:600, textAlign: ['Invested','Current','P&L'].includes(h)?'right':'left', borderBottom:'1px solid var(--border)' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {parsed.map((r,i) => (
                <tr key={i} onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <td style={{ ...tdS, fontWeight:700, color:'var(--text)' }}>{r.ticker}</td>
                  <td style={tdS}>{r.qty || '—'}</td>
                  <td style={tdS}>₹{r.avgPrice || '—'}</td>
                  <td style={tdS}>₹{r.curPrice || '—'}</td>
                  <td style={{ ...tdS, textAlign:'right' }}>{r.invested ? fmt(r.invested) : '—'}</td>
                  <td style={{ ...tdS, textAlign:'right' }}>{r.current ? fmt(r.current) : '—'}</td>
                  <td style={{ ...tdS, textAlign:'right', color: r.gain >= 0 ? 'var(--gain)':'var(--loss)', fontWeight:600 }}>
                    {r.invested ? `${r.gain>=0?'+':''}${fmt(r.gain)} (${fmtPct(r.gainPct)})` : '—'}
                  </td>
                  <td style={tdS}>
                    <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:99,
                      background: r.matched ? 'var(--gain-bg)' : 'var(--info-bg)',
                      color: r.matched ? 'var(--gain)' : 'var(--info)' }}>
                      {r.matched ? `✓ ${r.matchName?.split(' ')[0]}` : 'NEW'}
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Format guide */}
      <div style={{ background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:8, padding:'12px 16px' }}>
        <div style={{ fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:8 }}>Supported Formats</div>
        <div style={{ display:'flex', gap:24, flexWrap:'wrap' }}>
          {[
            { broker:'Zerodha Console', cols:'Symbol, ISIN, Qty, Avg cost, LTP, P&L' },
            { broker:'Groww',           cols:'Symbol, Quantity, Average Price, Current Price' },
            { broker:'Paytm Money',     cols:'Scrip Name, Qty, Buy Avg, CMP' },
            { broker:'Generic',         cols:'Any CSV with Symbol/Ticker + Quantity + Price columns' },
          ].map(b => (
            <div key={b.broker}>
              <div style={{ fontSize:12, fontWeight:600, color:'var(--text)' }}>{b.broker}</div>
              <div style={{ fontSize:11, color:'var(--muted)' }}>{b.cols}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Export PDF ───────────────────────────────────────────────────────────────
function ExportPDF({ data }) {
  function doExport() {
    const { netWorth, totalInvested, totalGains, totalGainsPct, xirr, cagr, alpha, assets } = data;
    const topHoldings = [...assets].sort((a,b)=>b.current-a.current).slice(0,8);
    const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Phoenix Research — Portfolio Snapshot</title>
